body:
  text: 卷首序靈素為醫家正傳後世張仲景王叔和孫思邈孫兆初虞世朱肱皆不師內經惟採本草諸書各以己見自成一家之技治小疾則可治大病不效矣王叔和朱肱烏可與仲景同列若云仲景不師內經試觀傷寒金匱二書不本靈素之旨寧有如是精深之論乎至皇甫士安巢元方王冰等雖學素問而不得方學之傳亦依前六子方法而行此書從古至今未得通行餘業醫四世皆得此法之力而人世未深信故難梓行余初學醫盡博六子之書以為醫之理盡矣然調治小疾百發百中臨大病百無二三每悵己術之不精也後遇關中老醫叩余所學笑曰汝學非是岐黃正派特小技爾只能調小疴俟其自愈豈能起大病哉余即從而師之三年師以法授我反復參詳遂與內經合旨由茲問世百發百中再觀六子書真兒戲耳但師授固簡而當意欲梓行恐有未盡遂將追隨先師所歷之法與己四十餘稔之所治驗集成醫流正道以救萬世夭枉後人得此苟能日夜勤求自能洞貫其理以見余言非謬至若賢良忠正孝子仁人再為廣布俾天下後世上可以救君親下可以濟斯民余因恐遭天譴不敢自私刊刻流傳願仁者勿拘成見而屑視之斯幸矣宋紹興十六年武翼郎前開州巡檢竇材謹序細觀此敘前後語意不相聯屬似非通人之語疑是後人偽作奏玉帝青辭維大宋紹興十六年丙寅月武翼郎臣竇材奏啓玉皇上帝玉陛下臣聞上天好生而惡死下民畏死而貪生上天雖云惡殺但示勸懲於下民非其人而殺之者有之下民雖曰貪生但歸生死於天命而致枉死者有之皇天憫下民之疾苦故假神農黃帝岐伯雷公扁鵲俞跗等以立醫教救人災病歷世綿遠屢遭兵火其神書散亡僅存者靈樞素問而已雖不盡傳宗派是亦能救人疾苦保人性命但少洞徹臟腑刳腸滌髓之神耳果能參悟靈素自然洞見臟腑至於刳腸滌髓乃後世法之巧而用之神惜乎此書無傳諒亦不過一技術之妙豈如靈素之貫天人晰隱顯大無不包細無不入為萬世理道之神書救人之祕典哉後世仲景採內經外感風寒之旨附以己見定立方法及採雜證七十餘條集為傷寒金匱後之學者咸遵守莫敢移易殊不知傷寒既有多證內經自然該載何必牽扯種種雜病以為傷寒誤人不少果能遵循仲景之法豈有誤人惟後學不明其旨妄為注解各執己見未免穿鑿希冀立名遺訛後世將為仲景之功臣實為仲景之罪人千百年來明傷寒法者有幾人哉嗣後叔和思邈又附益之障蔽聖經遺訛後世且經云傷寒為病身熱熱雖甚不死論中風曰中五臟俞穴則為偏風論水脹曰因氣為腫論厲風曰地之濕氣感則害人皮肉筋脈如此言之其旨深其意廣後之人欲移難就易妄為穿鑿且舉傷寒之證真邪相傳真氣盛則病愈邪氣盛則病死陽證無死入之理陰證害人甚速須加灸艾方保無虞仲景立許多承氣湯使後人錯用致寒涼殺人於頃刻也三承氣湯惡能害人後學不明陰陽承製之道而妄用承氣者害之耳於仲景何尤臣因母病用仲景之法不效遂成不救痛心疾首精究內經又得皇天默授經歷十年方得靈驗凡一切大病小疾只以此法觸類引申效如影響臣苦志五十餘年悟得救人祕法已十餘年矣向因薄宦奔走四方今年過不逾常慮身填溝壑其書失傳遂欲考訂發梓伏望皇天后土特加慈憫保生民於仁壽之域俾其書萬世通流臣雖死無憾設有一言不實甘受天殃若此書果益於後世伏望神天護佑以廣其傳設此重誓以質上帝則其立心切於天下後世可知學者不可謂偏於從熱而忽視之以負先生一片救世婆心臣誠惶誠恐冒罪以聞進醫書表臣聞醫家正道內經為真內經言病最詳而無治病之法故黃帝又與岐伯撰出靈樞實為醫門所最急者也嗣後秦越人依內經旨趣而演八十一難九針之説晉皇甫士安採靈樞之旨撰甲乙經十卷隋巢元方摘靈素緒餘注內經又撰病原三十卷唐王冰抉靈素之旨注內經撰天元玉曆以上諸子皆有著作悉師靈素去古法不遠而漢張仲景不師內經惟採本草湯液著金匱玉函十卷撰傷寒論十卷晉王叔和又贅其説唐孫思邈採本草藥性集成千金方三十卷玉函經五十卷和附仲景重重著述皆宗此意廢去針灸及丹附大藥盡用草木小藥盛行湯劑以之理小疾則生治大病則百無一活至千百世誤死天下蒼生傷寒金匱之書辨六氣之環轉析神機之出入陰陽消長之妙虛實遞更之變首尾貫通絲絲入扣至於在經俞而用針起陷下而用灸並觀其自敘可謂神於師內經者矣謂仲景不師內經廢棄針灸不亦冤乎至若叔和思邈俱一代之明醫亦未宜深貶後學當細心辨之伏念臣河朔真定之寒士焉敢善善揭前輩之過但臣世祖隸傳於醫學內舍相傳亦以千金仲景等方小試果效用臨大證心竊有疑後得上天裨我此書更參內經百發百中始信醫有回天之功也所謂大病者一傷寒二陰疽內蝕三虛勞痰火四中風五水腫六臌脹七脾泄暴注八尸厥九久痢十脾瘧十一喉痹十二男女骨蒸勞熱十三小兒急慢驚風十四痘疹黑斑縮陷至於胎前産後百十種必死大證世人莫能救療束手待斃良可哀哉臣於此處消息五十餘年乃見正道自古扁鵲俞跗倉公華他皆此書也惜不廣傳於後世臣今盡傳此法於人以救蒼生夭橫伏乞陛下大展聖裁憫諸未世將此書頒行天下試之有驗臣死無憾若試之不效即置臣於法以彰誑君之罪臣誠惶誠恐稽手頓首冒死以聞張師固不可毀而王孫亦不可闢夫先生之書固創出前賢然先鬚根底於素問靈樞致力於仲景思邈更充之以先生之法其於大疾沉疴自然遊刃有餘矣無如叔世衰漓只知耳食性喜寒涼畏惡針灸稍一談及俱搖頭咋舌甘死不受是以先生之道難明而先生之法不能行於斯世斯民也豫欲以代之之方思惟數載終無妙法先生倘以宿昔濟世仁心神感於豫使豫應心得手再為廣布以傳不朽諒先生在天之靈亦應許可古月老人胡珏謹識
