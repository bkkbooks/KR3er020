body:
  text: 卷下陰莖出膿此由酒色過度真氣虛耗故血化為膿令人漸漸羸瘦六脈沉細當每日服金液丹霹靂湯外敷百花散五六日腹中微痛大便滑小便長忌房事犯之復作若灸關元二百壯則病根去矣遺滑淋濁無不由酒色之過至於血出可謂劇矣又至化血為膿則腎虛寒而精腐敗非溫補不可更須謹戒若仍不慎必致泄氣而死腸癰此由膏粱飲酒太過熱積腸中久則成癰服當歸建中湯自愈若近肛門者用針刺之出膿血而愈此證身皮甲錯腹皮急脹如腫甚者腹脹大轉有水聲或繞臍生瘡若臍間出膿者不治大法以口為主若膿成而殞腸痔此由酒肉飲食太過致經脈解而不收故腸裂而為痔服金液丹可愈外取鼠腐當是婦字蟲十枚研爛攤紙上貼之少刻痛止若老人患此須灸關元二百壯不然腎氣虛毒氣下注則難用藥也凡系咳嗽吐血後大腸並肺虛極而熱陷於大腸多難收功若專於治痔而不顧本原未有不致斃者膏肓病人因七情六慾形寒飲冷損傷肺氣令人咳嗽胸膈不利惡寒作熱可服全真丹若服冷藥則重傷肺氣令人胸膈痞悶昏迷上奔口中吐冷水如含冰雪四肢困倦飲食漸減此乃冷氣入於肺中侵於膏肓亦名冷勞先服金液丹除其寒氣再用姜附湯十日可愈或服五膈散撮氣散去肺中冷氣重者灸中府三百壯可愈形寒飲冷之傷初起原不甚深重醫人不明此證誤與涼藥積漸冰堅致成膏肓之疾及至氣奔吐冷寒熱無已不思轉手溫補仍與以滋陰退熱等劑以致不起非是病殺乃醫殺也治驗有一人暑月飲食冷物傷肺氣致咳嗽胸膈不利先服金液丹百粒泄去一行痛減三分又服五膈散而安但覺常發後五年復大發灸中府穴五百壯方有極臭下氣難聞自後永不再發世醫不審病因動云暑月熱氣傷肺一派寒涼致水氣不消變成大病噎病肺喜暖而惡寒若寒氣入肺或生冷所傷又為庸醫下涼藥冰脫肺氣成膈噎病覺喉中如物塞湯水不能下急灸命關二百壯自然肺氣下降而愈噎病之多死者皆由咽中堵塞飲食不進醫人畏用熱藥多用寒涼潤取其滋補焉能得生用先生灸法甚妙奈人不能信用何哉又有肺寒一證令人頭微痛多清涕聲啞惡寒肩背拘攣脈微浮緊當服華蓋散重則姜附湯忌冷物此證不可誤認作癆證治故表而出之肺寒之證世醫不識不能用溫散但用桑皮貝母麥冬玉竹等味壅住寒邪做成弱證者多矣咳嗽咳嗽多清涕者肺感風寒也華蓋散主之若外感風寒內傷生冷令人胸膈作痞咳而嘔吐五膈散主之咳嗽煩躁者屬腎石膏丸主之大凡咳嗽者忌服涼藥犯之必變他證忌房事恐變虛勞久咳而額上汗出或四肢有時微冷間發熱困倦者乃勞咳也急灸關元三百壯服金液丹保命丹姜附湯須早治之遲則難救治咳嗽之法若如先生因證制宜焉有癆瘵不治之患無如醫者輒以芩知桑杏為要藥致肺氣冰伏脾腎虛敗及至用補又不過以四君六味和平之劑和平之藥與之所謂養殺而已咳㗇病此證方書名為哮喘因天寒飲冷或過食鹽物傷其肺氣故喉常如風吼聲若作勞則氣喘而滿須灸天突穴五十壯重者灸中脘穴五十壯服五膈散或研蚯蚓二條醋調服立愈哮證遇冷則作逢勞則甚審治得當愈亦不難然少有除根者先生此法甚妙請嘗試之失血凡色欲過度或食冷物太過損傷脾肺之氣故令人咯血食前服鍾乳粉金液丹食後服阿膠散而愈若老年多於酒色損傷脾氣則令人吐血損傷腎氣則令人瀉血不早治多死當灸關元三百壯服姜附湯金液丹自愈傷肺氣則血從鼻出名曰肺衄乃上焦熱氣上攻也服金液丹或口含冷水以鬱金末調塗項後及鼻柱上凡肺衄不過數杯如出至升斗者乃腦漏也當作腦衄為是由真氣虛而血妄行急針關元三寸留二十呼立止再灸關元二百壯服金液丹草神丹可保失血之證世人所畏而醫人亦多縮手其畏者為殞命之速而成癆瘵之易縮手者恐不識其原而脫體之難不知能究其原察其因更觀其色辨其脈或起於形體之勞或成於情志之過由於外感者易治出於內傷者難痊絡脈與經隧有異經隧重而絡脈輕肝脾與肺腎不同肺腎難而肝脾易苟不訛其治法雖重難亦可挽回唯在辨別其陰陽權衡其虛實溫清補瀉各得其宜不可畏其炎焰專尚寒涼逐漸消伐其生氣而致不可解者比比矣治驗一人患腦衄日夜有數升諸藥不效余為針關元穴入二寸留二十呼問病人曰針下覺熱否曰熱矣乃令吸氣出針其血立止一法治鼻衄與腦衄神方用赤金打一戒指帶左手無名指上如發作時用右手將戒指捏緊箍住則衄止矣腎厥凡人患頭痛百藥不效者乃腎厥服石膏丸黑錫丹則愈此病多酒多色人則有之經云厥成為巔疾又云少陰不至者厥也頭痛之證腎虛者多若用他藥斷難奏效惟大溫補為是溫補不效其丹艾乎治驗一人因大惱悲傷得病晝則安靜夜則煩悗不進飲食左手無脈右手沉細世醫以死證論之余曰此腎厥病也因寒氣客脾腎二經灸中脘五十壯關元五百壯每日服金液丹四神丹至七日左手脈生少頃大便下青白膿數升許全安此由真氣大衰非藥能治惟艾火灸之此證非灸法不愈非丹藥不效二者人多不能行醫人僅用泛常藥以治其何能生脾勞人因飲食失節或吐瀉服涼藥致脾氣受傷令人面黃肌瘦四肢困倦不思飲食久則肌肉瘦盡骨立而死急灸命關二百壯服草神金液甚者必灸關元先天之原腎是也後天之本脾是也人能於此二臟謹攝調養不使有乖自然臟腑和平經脈運行榮衛貫通氣血流暢又何勞病之有病至於勞則已極矣非重溫補何由得生虞範溪強立五勞之證所用皆系溫平涼劑以此災梨禍棗實是貽害後人腎勞夫人以脾為母以腎為根若房事酒色太過則成腎勞令人面黑耳焦筋骨無力灸關元三百壯服金液丹可生遲則不治頭痛風寒頭痛則發熱惡寒鼻塞肢節痛華蓋五膈消風散皆可主若患頭風兼頭暈者刺風府穴不得直下針恐傷大筋則昏悶向左耳橫紋針下入三四分留去來二十呼覺頭中熱麻是效若風入太陽則偏頭風或左或右痛連兩目及齒灸腦空穴二十一壯其穴在腦後入髮際三寸五分再灸目窗二穴在兩耳直上一寸五分二十一壯左痛灸左右痛灸右頭風之病證候多端治得其法者殊少致為終身痼疾先生刺灸二法甚妙無如醫者不知病者畏痛奈何眼病肝經壅熱上攻致目生昏翳先服洗肝散數劑後服撥雲散其翳自去若老年人腎水枯涸不能上榮於目致雙目昏花漸至昏暗變為黃色名曰內障服還睛丹半月目熱上攻勿懼此乃腎氣復生上朝於目也如覺熱以手掌揉一番光明一番一月間光生復舊矣眼科用藥不循紀律只用一派發散寒涼所謂眼垃圾是也倘能盡如先生之法而行之天下喪明者少矣治驗余家女婢忽二目失明視之又無暈翳細思此女年少精氣未衰何緣得此證良由性急多怒有傷肝臟故經脈不調而致遂與密蒙花散一料如舊光明矣病有萬變醫止一心線索在手頭緒逼清何懼病體之多端不愁治療之無術夢泄凡人夢交而不泄者心腎氣實也夢而即泄者心腎氣虛也此病生於心腎非藥可治當用紙捻長八寸每夜緊繫陰囊天明解之自然不泄若腎氣虛脫寒精自出者灸關元六百壯而愈若人一見女子精即泄者乃心腎大虛也服大丹五兩甚者灸巨門五十壯仲景云陰寒精自出酸削不能行可知精之不固由於陽之不密先生云腎氣虛脫寒精自出則溫補下元為得法矣世醫苟明此理以治遺精必不專事寒涼而治人夭枉矣奔豚此由腎氣不足又兼濕氣入客小腸連臍發痛或上或下若豚之奔或痛連外腎成疝氣者服塌氣散茱萸丸金鈴子丸或蟠蔥散奔豚與疝不同混淆不得從小腹而上抵心者奔豚也從少腹而上逆臍肙氣與橫弦冐疝也從陰囊而上衝心膈痛欲死者沖疝也從少腹而下連腎區者小腸與狐疝也是有差別不可不審肺膈痛此證因肺虛氣不下降寒氣凝結令人胸膈連背作痛或嘔吐冷酸水當服五膈散自愈此證治若失宜久久必成膈證骨縮病此由腎氣虛憊腎主骨腎水既涸則諸骨皆枯漸至短縮治遲則死須加灸艾內服丹附之藥非尋常草木藥所能治也凡人年老逐漸矬矮其猶骨縮之病乎治驗一人身長五尺因傷酒色漸覺肌肉消瘦予令灸關元三百壯服保元丹一斤自後大便滑小便長飲食漸加肌肉漸生半年如故此自消瘦與骨縮有間不知何緣附此中間疑有缺文手顫病四肢為諸陽之本陽氣盛則四肢實實則四體輕便若手足顫搖不能持物者乃真元虛損也常服金液丹五兩姜附湯自愈若灸關元三百壯則病根永去矣手足顫搖終身痼疾若傷寒初起如是者多難治若過汗傷營而致者宜以重劑扶陽加以神氣昏亂者亦不治老人便滑凡人年少過食生冷硬物麵食致冷氣積而不流至晚年脾氣一虛則脅下如水聲有水氣則大便隨下而不禁可服四神丹姜附湯甚者灸命關穴此病須早治遲則多有損人者又脾腎兩虛則小便亦不禁服草神丹五日即可見效老人大便不禁溫固灸法為妥若連及小便而用草神丹中有硃砂琥珀恐非其宜老人口乾氣喘老人脾虛則氣逆衝上逼肺令人動作便喘切不可用削氣苦寒之藥重傷其脾致成單腹脹之證可服草神丹金液丹姜附湯而愈甚者灸關元穴腎脈貫肺系舌本主運行津液上輸於肺若腎氣一虛則不上榮故口常乾燥若不早治死無日矣當灸關元五百壯服延壽丹半斤而愈口乾氣喘系根元虛而津液竭庸醫不思補救猶用降削苦寒之品不慚自己識力不真而妄掃溫補之非宜及至暴脫更卸過於前藥之誤此輩重臺下品本不足論但惜見者聞者尚不知其謬妄仍奉之如神明重蹈覆轍者不一而足豈不哀哉耳聾有為風寒所襲而聾者有心氣不足而聾者當服一醉膏滾酒下汗出而愈若多酒色人腎虛而致聾蔽者宜先服延壽丹半斤後服一醉膏若實聾則難治腎開竅於耳又胃之宗氣別走於耳故耳聾一證屬虛者多今言心氣不足而用一醉膏此理未解又云實聾者難治尚俟細參琦按人於六十外精神強健不減少壯而惟耳重聽乃腎氣固藏之徵多主老壽不須醫治此書所謂若實聾則難治者當是指此一種氣癭若山居人溪澗中有姜理石飲其水令人生癭瘤服消風散當是消癭散初者服姜附湯若血癭血瘤則不可治妄治害人三蟲三蟲者蛔蟲蟯蟲寸白蟲也幼時多食生冷硬物及腥厭之物久之生蟲若多食牛肉則生寸白其蛔蟲長五六寸發則令人心痛吐清水貫心則死寸白蟲如葫蘆子子母相生長二三寸發則令人腹痛蟯蟲細如髮隨氣血周遊遍身出皮膚化為瘋癩住腹中為蟯瘕穿大腸為痔漏俱宜服安蟲散若人穀道癢痛當用輕粉少許服之來日蟲盡下寸白蟲亦能下治驗一婦人病腹脹諸藥不效余令解腹視之其皮黃色光如鏡面乃蟯瘕也先炙牛肉一斤令食後用生麻油調輕粉五分服之取下蟯蟲一合如線如須狀後服安蟲散而愈蠱毒閩廣之人以諸蟲置一器內令其互相啖食候食盡而獨存者即蠱也中其毒則面目黃腫心腹脹滿疼痛或吐涎血久則死矣初得時用皂角一挺槌根二兩水煎濃汁二盞臨臥服之次早取下毒物後用以萬歲藤根濕紙裹煨熟每日空心嚼五枚生麻油送下三日毒從大便出凡人至川廣每日飲食宜用銀箸箸白即無妨箸黑即有毒也癇證有胎癇者在母腹中母受驚驚氣衝胎故生子成疾發則仆倒口吐涎沫可服延壽丹久而自愈有氣癇者因惱怒思想而成須灸中脘穴而愈胎癇出於母腹俗所謂三搐成癇者也氣癇由於七情故大病後及憂苦人並縱性貪口腹人率多患此醫書雖有陰陽五臟之分然皆未得其要而愈者蓋寡先生此法直中肯綮予用之而獲效者多矣治驗一人病癇三年餘灸中脘五十壯即愈一婦人病癇已十年亦灸中脘五十壯愈凡人有此疾惟灸法取效最速藥不及也瘰癧此證由憂思惱怒而成蓋少陽之脈循脅繞頸環耳此即少陽肝膽之氣鬱結而成亦有鼠涎墮食中食之而生是名鼠癧治法俱當於瘡頭上灸十五壯以生麻油調百花膏敷之內服平肝順氣之劑日久自消切不可用斑蝥石灰砒霜之類內經所謂陷脈為瘻留連肉腠此風邪外傷經脈留滯於肉腠之間而為瘰癧乃外感之輕者也靈樞經所謂腎臟受傷水毒之氣出於上而為鼠瘻失治多至殞命乃內傷之重者也婦人婦人除妊娠外有病多與男子相同但男子以元陽為主女子以陰血為主男子多腎虛為病女子多衝任虛為病蓋沖為血海任主胞胎血信之行皆由衝任而來若一月一次為無病愆期者為虛不及期者為實脈沉細而澀月信不來者虛寒也血崩者衝任虛脫也崩者倒也白帶者任脈冷也任為胞門子戶故有此也發熱減食皆為氣血脾胃之虛不減食止發熱者心臟虛也此外疾病治法皆與男子同婦人另立一科原屬無謂業方脈者不知男女之分陰陽之異衝任之原月信之期胎孕之病產乳之疾者則是走方小技之儔烏得稱大方哉子嗣婦人血旺氣衰則多子氣旺血衰則無子若發黑面色光潤肌膚滑澤腋隱毛稀乃氣衰血旺也主多子若發黃面無光彩肌肉粗澀腋隱毛多乃氣旺血衰也主無子若交合時女精先至男精後沖者乃血開裹精也主成男若男精先至女精後來者乃精開裹血也主成女若男女精血前後不齊至者則不成胎為子嗣計者重在擇婦婦人端莊則生子凝重交合有節則生子秀美既生之後又須選擇乳母兒吮其乳習其教導往往類之先天性情雖稟於父母而後天體局往往多肖乳母血崩經云女子二七而天癸至任脈通太衝脈盛月事以時下若因房事太過或生育太多或暴怒內損真氣致任脈崩損故血大下卒不可止如山崩之驟也治宜阿膠湯補宮丸半斤而愈切不可用止血藥恐變生他病久之一崩不可為矣若勢來太多其人作暈急灸石門穴其血立止血崩之證乃先後天衝任經隧周身之血悉皆不能收持一時暴下有如山崩水溢不可止遏非重劑參附補救不能生也間有屬實者當以形證求之帶下子宮虛寒濁氣凝結下焦衝任脈即子宮也不得相榮故腥物時下以補宮丸膠艾湯治之甚者灸胞門子戶穴各三十壯不獨病愈而且多子帶下之證十有九患皆由根氣虛而帶脈不收引然亦有脾虛陷下者有濕濁不清者有氣虛不攝者有陽虛不固者先生單作子宮虛寒誠為卓見乳癰良田藏氣虛衰血脈凝滯或為風寒所客著而成癰矣若陽明蘊熱亦能成此先覺憎寒壯熱服救生湯一劑若遲三五日宜多服取效胎逆病妊娠後多於房事或食冷物不消令人吐逆不止下部出惡物可服金液丹霹靂散即好胎逆即惡阻俗所謂病兒是也苟能慎起居戒房事節飲食不但無病兒之患而生子亦多易育若謹攝已當而仍病者是系孕婦體弱氣血多虛故耳午後潮熱若飲食減少四肢倦怠午後熱者胃氣虛也若起居如常但發煩熱乃胃實心氣盛也服茜草湯五日愈臍中及下部出膿水此由真氣虛脫衝任之血不行化為膿水或從臍中或從陰中淋瀝而下不治即死灸石門穴二百壯服金液丹姜附湯愈臍為神闕穴上脾下腎不可有傷若出膿水先後天之氣泄矣焉得不死婦人卒厥凡無故昏倒乃胃氣閉也灸中脘即愈貪食多欲之婦多有此證產後虛勞生產出血過多或早於房事或早作勞動致損真氣乃成虛勞脈弦而緊咳嗽發熱四肢常冷或咯血吐血灸石門穴三百壯服延壽丹金液丹或鍾乳粉十日減一月安凡虛勞而其脈弦緊者病已劇矣況在生產而出血過多者乎急投溫補唯恐已遲苟或昧此尚欲滋陰愈無日矣小兒小兒純陽其脈行疾一息六七至為率遲冷數熱與大人脈同但小兒之病為乳食所傷者十居其半發熱用平胃散吐瀉用珍珠散頭痛發熱恐是外感用蓽澄茄散穀食不化用丁香丸泄瀉用金液丹小兒之脈較之大人固是行疾第略差半至一至為率若六七至非平脈也平脈而六七至則數脈將八至矣脈至八至非脫而何驚風風木太過令人發搐又積熱蓄於胃脘胃氣瞀閉亦令卒僕不知人事先服碧霞散吐痰次進知母黃芩湯或青餅子硃砂丸皆可若脾虛發搐或吐瀉後發搐乃慢驚風也灸中脘三十壯服姜附湯而愈小兒之急驚慢驚猶大人中風之閉證脫證溫清補瀉審病當而用藥確自無差訛斑疹即痘子小兒斑疹世皆依錢氏法治之此不必贅但黑泡斑及縮陷等證古今治之未得其法以為火而用涼藥治者十無一生蓋此乃汙血逆於皮膚凝滯不行久則攻心而死黃帝正法用霹靂湯姜附湯凡多死之證但用此法常有得生者蓋毒血死於各經決無復還之理唯附子健壯峻走十二經絡故用此攻之十中常生八九於臍下一寸灸五十壯則十分無事若以涼藥凝冰其血致遍身青黑而死此其過也世俗凡遇熱證輒以涼藥投之熱氣未去元氣又漓此法最不良余每遇熱證以知母五錢煎服熱即退元氣無損此乃秘法錢氏之法後世兒醫咸遵守之以五行五色而分五臟之證以順逆險而為難易不治之條所用之藥不過溫平無奇陽熱之逆誠可救全陰寒之逆百無一愈其後陳氏雖云得法十中或救一二不若先生之論闡千古之秘奧為救逆之神樞兒醫苟能奉行自然夭枉者少矣每見世俗一遇逆證勿論陰陽輒云火閉石膏黃連大黃用之不厭人皆信之至死不悔近時費氏救偏瑣言一出庸子輒又奉為典型在證藥相合者雖偶活其一二而陰寒之證亦以其法治之冤遭毒害者不知凡幾矣小兒午後潮熱小兒午後潮熱不屬虛證乃食傷陽明必腹痛吐逆宜用來復丹蓽澄茄散吐瀉小兒吐瀉因傷食者用珍珠散因胃寒者用姜附湯吐瀉脈沉細手足冷者灸臍下一百五十壯慢驚吐瀉灸中脘五十壯人家肯用姜附小兒亦已幸矣若灼艾至一百五十壯以此法勸之斷乎不允只索托之空言耳面目浮腫此證由於冷物傷脾脾虛不能化水穀致寒飲停於中焦輕者面目浮腫重者連陰囊皆腫服金液丹輕者五日可愈重者半月全愈當飲軟粥半月硬物忌之金液丹洵是活命之神藥但世人不識在大人尚有許多疑慮小兒焉肯用哉咳嗽小兒肺寒咳嗽用華蓋散若服涼藥並止咳藥更咳者當服五膈散若咳嗽面目浮腫者服平胃散咳而面赤者上焦有熱也知母黃芩湯咳而面赤屬上焦實熱者宜用知母黃芩若咳甚而面赤兼嘔涎沫者則當以溫補氣血為宜溏瀉冷氣犯胃故水穀不化大便溏滑甚則脫肛者厚腸散半硫丸主之腹脹冷物傷脾則作脹來復丹全真丹皆可用痢疾痢因積滯而成者如聖餅化積而愈暑熱所傷下赤而腫者黃連丸腹痛者當歸芍藥湯寒邪客於腸胃下白者姜附湯桃花丸水瀉火熱作瀉珍珠散食積作瀉如聖餅感應丸胎寒腹痛藏氣虛則生寒寒甚則腹痛亦有胎中變寒而痛者調硫黃粉五分置乳頭令兒吮之即愈三四歲者服來復丹下血暑中於心傳於小腸故大便下血宜當歸建中湯牙疳胃脈絡齒榮牙床胃熱則牙縫出血犀角化毒丸主之出局方腎虛則牙齒動搖胃虛則牙床潰爛急服救生丹若齒齦黑急灸關元五十壯牙齒動搖或有知其腎虛者至牙床潰爛誰不曰胃火上攻敢服救主丸並灸關元者鮮矣螻蛄癤風寒凝於髮際或冷水沐頭小兒頭上生癤麻油調百花散塗之如腦癰初起亦服救生湯禿瘡寒熱客於發腠浸淫成瘡久之生蟲即於頭上灸五十壯自愈看其初起者即是頭也水沫瘡小兒腿胻間有瘡若以冷水洗之寒氣浸淫遂成大片甚至不能步履先以蔥椒姜洗挹干又以百花散糝之外以膏藥貼之出盡毒水十日全愈周身各穴巨闕在臍上五寸五分中脘在臍上四寸神闕在臍中陰交在臍下一寸氣海在臍下一寸五分石門在臍下二寸三分女人忌灸即胞門子戶關元在臍下三寸天柱在一椎下兩旁齊肩肺俞在三椎旁挾脊各相去一寸五分心俞在五椎下挾脊各相去一寸五分肝俞在九椎旁挾脊各相去一寸五分脾俞在十一椎旁挾脊各相去一寸五分腎俞在十四椎下兩旁挾脊各相去一寸五分腰俞在二十一椎下間湧泉在足心陷中承山在崑崙上一尺肉間陷中三里四穴二在曲池下一寸即手腕下一寸二在膝下三寸胻骨外大筋內宛宛中中府在乳上三肋骨中食竇即命關在中府下六寸天突在結喉下四寸宛中地倉一名胃維挾口吻旁四分上星在鼻上入髮際一寸前頂入髮際四寸五分目窗當目上入髮際一寸五分腦空在腦後入髮際三寸五分風府入髮際一寸
