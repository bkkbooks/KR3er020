body:
  text: 神方金液丹一名保元丹一名壯陽丹余幼得王氏博濟方云此丹治百種欲死大病竊嘗笑之恐無是理比得扁鵲方以此冠首乃敢遵用試之於人屢有奇效始信聖人立法非不神也乃不信者自誤耳此方古今盛行莫有疑議及孫真人著千金方乃言硫黃許多利害後人畏之遂不敢用亦是後人該墮夭折故棄大藥而求諸草木何能起大病哉余觀今人之病皆以溫平藥養死而不知悔余以此丹起數十年大病於頃刻何有發疽之説孫真人之過也凡我同志請試驗之自見奇效此丹治二十種陰疽三十種風疾一切虛勞水腫脾泄注下休息痢消渴肺脹大小便閉吐衄尿血霍亂吐瀉目中內障尸厥氣厥骨蒸潮熱陰證陰毒心腹疼痛心下作痞小腹兩脅急痛胃寒水穀不化日久膀胱疝氣膨膈女人子宮虛寒久無子息赤白帶下臍腹作痛小兒急慢驚風一切疑難大病治之無不效驗舶上硫黃十斤用銅鍋熬化麻布濾淨傾入水中再熬再傾如此七次研細入陽城罐內蓋頂鐵絲扎定外以鹽泥封固八分厚陰乾先慢火煅紅次加烈火煅一炷香寒爐取出埋地中三日去火毒再研如粉煮蒸餅為丸梧子大每服五十丸或三十丸小兒十五丸氣虛人宜常服之益壽延年功力最大一切牛馬六畜吐食者灌硫末立愈一切雞鵝鴨瘦而欲死者飼以硫末可以立愈且易肥作蒸餅法清明前一日將乾麵打成薄餅內放乾麵包裹陰乾保命延壽丹此丹治癰疽虛勞中風水腫臌脹脾泄久痢久瘧尸厥兩脅連心痛夢泄遺精女人血崩白帶童子骨蒸勞熱一切虛羸黃黑疸急慢驚風百餘種欲死大病皆能治之一粒勝金液丹十粒久服延年益壽硫黃明雄黃辰砂赤石脂紫石英陽起石火煅醋淬三次每味各二兩研作粗末同入陽城罐蓋頂鐵絲扎定鹽泥封固厚一寸陰乾掘地作坑下埋一半上露一半烈火煅一日夜寒爐取出研細醋丸梧子大每服十粒空心送下童男女五粒小兒二三粒俱見成效大丹此丹補腎氣駐顏色活血脈壯筋骨輕步履明耳目延年益壽治虛勞發熱咳嗽咯血骨蒸盜汗怔忡驚悸一切陰疽冷漏小兒斑痘縮陷水腫臌脹黃黑疸一切虛羸大病功同延壽丹常服可壽百歲余但富貴人方得合此貧者難合只服金液丹亦妙也大硃砂一斤要有牆壁者為粗末入陽城罐先用蜜拌安砂在底次以瞿麥末草烏末菠菱末各五錢以雞子清五錢拌勻蓋在砂上以罐蓋蓋住鐵絲扎好鹽泥封固陰乾掘地作坑下埋五分上露五分烈火煅一日夜寒爐取出研細醋打半夏糊丸芡實大滑石為衣以發光彩銀器收貯每服五粒或三粒空心面東熱酒下凡用入藥中併為衣者俱如此制則無毒可放心服中丹此丹補腎氣壯筋骨延年不老治脾瘧黃黑疸脾泄久痢虛腫水腫女人血崩白帶骨蒸勞熱小兒急慢驚風及暴注腸滑洞泄中風諸般瘡毒皆效雄黃十兩赤石脂二兩其共為粗末亦用前五味拌制如大丹法取研極細醋糊丸芡實大大人服十丸小兒三五丸空心熱酒或米飲下三黃丹此丹治中滿胸膈痞悶中風痰喘氣急大便虛祕功與中丹同但略峻耳雄黃雌黃硫黃各五兩為粗末製法如大丹研極細醋糊丸芡實大每服十丸空心米飲下四神丹此丹治病功力與延壽丹同治虛證更多能止怔忡驚悸諸般大病同前三黃丹外加辰砂五錢製法合法丸法俱如前每服四十丸空心白湯下五福丹此丹功力與延壽丹中丹同又能壯陽治陽萎於腎虛之人功效更多雄黃雌黃硫黃辰砂陽起石各五兩製法合法丸法皆如前每服三四十丸空心米飲下紫金丹此丹補脾腎虛損活血壯筋骨治下元虛憊子宮寒冷月信不調臍腹連腰疼痛面黃肌瘦泄瀉精滑一切虛損之證代赭石燒紅醋淬七次赤石脂製法同禹餘糧製法同各五兩共研細末入陽城罐鹽泥封固一寸厚陰乾大火煅三炷香冷定再研極細醋糊丸芡實大每服十丸熱酒送下全真丹此丹補脾腎虛損和胃健下元進飲食行濕氣治心腹刺痛胸滿氣逆脅下痛心腹脹痛小便頻數四肢厥冷時發潮熱吐逆泄瀉暑月食冷物不消氣逆痞悶男女小兒面目浮腫小便赤澀淋瀝一切虛寒之證高良薑炒四兩乾薑炒四兩吳茱萸炒三兩大附子制陳皮青皮各一兩上為末醋糊丸梧子大每服五十丸小兒三十丸米飲下無病及壯實人不宜多服來復丹此丹治飲食傷脾心腹作痛胸膈飽悶四肢厥冷又治傷寒陰證女人血氣刺痛或攻心腹或兒枕作痛及諸鬱結之氣真良方也陳皮去白青皮大川附制五靈脂各六兩硝石硫黃各三兩上為末蒸餅丸梧子大每服五十丸白湯下草神丹此丹大補脾腎治陰毒傷寒陰疽痔漏水腫臌脹中風半身不遂脾泄暴注久痢黃黑疸虛勞發熱咳嗽咯血兩脅連心痛胸膈痞悶脅中如流水聲童子骨蒸小兒急慢驚風痘疹變黑縮陷氣厥卒僕雙目內障吞酸逆氣痞積血塊大小便不禁奔豚疝氣附骨疽兩足少力虛汗不止男子遺精夢泄沙石淋溺血婦人血崩血淋暑月傷食腹痛嘔吐痰涎一切疑難大病此丹乃藥中韓信也取效最速好生君子廣試驗之知不誣也川附子制五兩吳茱萸泡二兩肉桂二兩琥珀五錢用柏子煮過另研辰砂五錢另研麝香二錢另研先將前三味為細末後入琥珀辰砂麝香三味共研極勻蒸餅丸梧子大每服五十丸米飲下小兒十丸神方薑附丹此丹補虛助陽消陰治傷寒陰證癰疽發背心胸作痛心腹痞悶喉痹頤項腫湯水不下及虛勞發熱咳嗽吐血男婦骨蒸勞熱小兒急慢驚風痘疹縮陷黑泡水泡斑脾勞面黃肌瘦腎勞面白骨弱兩目昏翳內障脾瘧久痢水瀉米穀不化又能解利兩感傷寒天行瘟疫山嵐瘴氣及不時感冒等證生薑切片五兩川附子炮切片童便浸再加薑汁炒乾五兩共為末每服四錢水一盞煎七分和渣服若治中風不語半身不遂去附子用川烏去黑皮製法與附子同霹靂湯治脾胃虛弱因傷生冷成泄瀉米穀不化或脹或痛或痞胸脅連心痛兩脅作脹單腹臌脹霍亂吐瀉中風半身不遂脾瘧黃疸陰疽入蝕骨髓痘疹黑陷急慢驚風氣厥發昏又能解利陰陽傷寒諸般冷病寒氣川附泡去皮臍五兩桂心去皮盡二兩當歸二兩甘草一兩共為細末每服五錢水一大盞生薑七片煎至六分和渣通口服小兒止一錢救生湯治一切癰疽發背三十六種疔二十種腫毒若初起憎寒壯熱一服即熱退身涼重者減半輕者全愈女人乳癰乳岩初起薑蔥發汗立愈又治手足痰塊紅腫疼痛一服即消久年陰寒冷漏病一切瘡毒服之神效芍藥酒炒當歸酒洗木香忌火丁香各五錢川附炮二兩共為細末每服五錢加生薑十片水二盞煎半和渣服隨病上下食前後服鍾乳粉治勞咳咯血老人上氣不得臥或膈氣腹脹久咳不止及喉風喉腫兩目昏障童男女骨蒸勞熱小兒驚風胎前産後發昏不省人事一切虛病能先於臍下灸三百壯後服此藥見效如神蓋虛勞乃腎氣欲脫不能上榮於肺此藥是潤肺生水之劑後因邪説盛行以致此藥隱間丹溪云多服發渴淋此言甚謬余家大人服三十年未嘗有此疾故敢附此服此藥須忌人參白朮二味石鐘乳一斤煅成粉製法見李時珍本草內再入石鼎煮三炷香研極細每服三錢煎粟米湯下但此藥難得真者多以滴乳石亂之真者浮水性松煅易成粉蓽澄茄散治脾胃虛滿寒氣上攻於心心腹刺痛兩脅作脹頭昏四肢困倦吐逆發熱泄瀉飽悶等證蓽澄茄高良薑肉桂丁香厚朴薑汁炒桔梗去蘆陳皮三稜炮醋炒甘草各一兩五錢香附制三兩為細末每服四錢薑三片水一盞煎七分和渣服半硫丸治胃虛心腹脹滿嘔吐痰涎頭目旋暈困倦不食或大便滑泄水穀不化小兒面目浮腫小便赤淋半夏薑礬牙皂煎水炒倭硫生薑各五兩同搗碎水浸蒸餅糊丸梧子大每服五十丸小兒二三十丸白湯下滲濕湯治脾胃虛寒四肢困倦骨節痠疼頭暈鼻塞惡風多虛汗痰飲不清胸滿氣促心腹脹悶兩脅刺痛霍亂吐瀉此藥能暖脾胃闢風寒祛瘴疫除風濕厚朴二兩丁香甘草附子各一兩砂仁乾薑肉果麵裹煨透高良薑各八錢銼碎每用五錢加薑三片棗三枚水一盞煎七分去渣空心服生薑半夏湯治風痰上攻頭旋眼花痰壅作嗽面目浮腫生薑半夏各三兩共搗餅陰乾為末每服四錢加薑五片水煎溫服附子半夏湯治胃虛冷痰上攻頭目旋暈眼昏嘔吐等證川附生薑各一兩半夏陳皮去白各二兩共為末每服七錢加薑七片水煎服平胃湯治老人氣喘咳嗽葶藶炒一兩官桂去粗皮一兩另研馬兜鈴去絲蒂三兩共為末每用三錢水一盞煎七分於食後細細呷之太白丹療咳嗽化痰涎枯礬煨寒水石煅元精石煅各四兩半夏制天蟲炒去絲天南星制白附子各二兩上為末麵糊丸麵糊即蒸餅也梧子大每服三十丸食後薑湯下鹿茸丸溫補下元疏通血脈明目輕身鹿茸一具去毛酥炙鹿角霜二兩川楝子炒取淨肉青皮木香各一兩上為末蒸餅丸梧子大每服三十丸空心鹽湯下黃藥子散治纏喉風頤頜腫及胸膈有痰湯水不下者用此吐之黃藥子即斑根一兩為細末每服一錢白湯下吐出頑痰即愈八風湯治中風半身不遂言語謇塞口眼喎斜先灸臍下三百壯後服此藥永不再發若不加灸三年後仍發也當歸防己人參秦艽官桂防風叉斛芍藥黃耆甘草川芎紫菀石膏白蘚皮川烏川羌活川獨活黃芩麻黃去節乾薑遠志各等分銼為末每服五錢水酒各半煎八分食前服八風丹治中風半身不遂手足頑麻言語謇塞口眼喎斜服八風湯再服此丹永不再發大川烏炮荊芥穗各四兩當歸二兩麝香另研五錢上為末酒糊丸梧子大空心酒下五十丸中風者不可缺此換骨丹治中風半身不遂言語謇澀失音中風者先灸臍下三百壯服金液丹一斤再服此藥當歸芍藥人參鐵腳威靈仙各二兩南星三兩乳香去油二兩沒藥去油二兩麻黃去節三斤另煎汁和上藥上各為末先將前五味和勻後入乳香沒藥以麻黃膏和勻為丸如彈子大每以無灰酒下一丸出汗五日一服仍常服延壽丹金液丹三五七散治賊風入耳口眼喎斜之證人參麻黃去節川芎官桂當歸以上各一兩川烏甘草各五錢上為末每服二錢茶下日三次蜜犀丸治半身不遂口眼喎斜語言不利小兒驚風發搐槐角炒四兩當歸川烏元參炒各二兩麻黃茯苓乳拌防風薄荷甘草各一兩豬牙皂角去皮弦子炒五錢冰片五分另研先以前十味為末後入冰片和勻蜜丸櫻桃大每服一丸小兒半丸細嚼茶清下白龍丸治風邪言語不遂等證面如蟲行手足麻木頭旋眼暈及傷風傷寒頭痛拘急小兒急慢驚風大人風搐失音並皆治之天南星四兩以生薑四兩同搗成餅川烏甘草藁本甘松白芷桂心各二兩海桐皮一兩石膏二兩煅研極細以前八味共為末糯米糊丸彈子大石膏為衣茶清下大人一丸小兒半丸若治傷寒薑蔥湯下出汗華蓋散治傷寒頭痛發熱拘急感冒鼻多清涕聲音不清大能解利四時傷寒瘟疫瘴氣等證麻黃四兩浸去沫蒼朮八兩米泔浸陳皮官桂杏仁去皮尖甘草各二兩共為末每服四錢水盞半煎八分食前熱服取汗祛風散治風寒頭痛遍身拘急破傷風洗頭風牙槽風肩背痓直口噤天南星二兩泡生薑一兩同南星制防風二兩甘草一兩共為末每服四錢薑七片水煎服取汗無汗再服當歸柴胡湯治傷寒頭痛發熱惡寒肢節痛吐逆柴胡五錢半夏二錢以生薑一錢同搗當歸一錢甘草五分加薑棗以水二盞煎至八分熱服取汗微微即止大通散治傷寒胃中有熱或服熱藥太多發狂言棄衣而走登高而歌或腹痛下血但實熱者用之虛人大忌大黃二錢枳實麩炒二錢甘草一錢水煎空心熱服不利再服得利即止知母黃芩湯