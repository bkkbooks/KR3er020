治老人虛氣中風産後大便不通枳實麩炒青皮陳皮各一兩共為末每服四錢水一盞煎七分空心服菟絲子丸補腎氣壯陽道助精神輕腰腳菟絲子一斤淘淨酒煮搗成餅焙乾附子制四兩共為末酒糊丸梧子大酒下五十丸十日後強壯石膏丸治腎厥頭痛及腎虛咳嗽煩悶遺尿石膏一兩硫黃一兩硝石一兩合硫黃同研天南星一兩用生薑一兩同搗為末麵糊丸梧子大食前米飲下五十丸日二次宣風丸治風濕腳氣走注上攻兩足拘急疼痛或遍身作痛黑醜取頭末二兩青皮一兩胡椒二十一粒全蠍二十四枚去頭足共為末蜜丸梧子大食前白湯下五十丸或三十丸五膈散治肺傷寒誤服涼藥冰消肺氣胸膈膨脹嘔吐酸水口中如含冰雪體倦減食或成冷勞胸中冷痰服此皆效人參黃耆炙白朮麥冬官桂附子炮乾薑炒遠志去心臺椒北細辛百部去蘆杏仁各等分共為末水煎服四錢撮氣散治涼藥傷肺飲食不下胸膈飽悶吞酸氣逆久嗽不止白朮乾薑各二兩黃耆蜜水拌炒附子川椒杏仁各一兩甘草五錢共為粗末水煎服四錢初服冷熱相搏覺煩悶欲吐少頃撮定肺氣自然下降矣麥煎散治幼年心絡為暑所傷每至暑時即畏熱困倦減食知母烏梅肉地骨皮柴胡各二錢大麥一撮上銼片成一劑水煎溫服緩下剪紅丸治遠年近月腸澼下血吳茱萸去梗二兩荊芥穗二兩川烏一兩上炒黃色共為末醋糊丸梧子大每服五十丸空心白湯下分氣丸治心腹痞悶疼痛兩脅氣脹痰涎上攻咽嗌不利能行氣化酒食黑醜半生半熟取頭末四兩青皮炒陳皮炒乾薑炮肉桂各一兩共為末水法梧子大每服三十丸空心薑湯下鎮心湯治心氣不足為風邪鬼氣所乘狂言多悲夢中驚跳人參茯苓石菖蒲桑葉水拌炒遠志木香丁香各一錢甘草乾薑各五錢大棗三枚水煎空心服遠志丸治心氣不足多悲健忘精神皆默手顫腳搐多睡遠志人參石菖蒲茯苓為末蜜丸梧子大每服三十丸酒棗湯任下定痛丸治奔豚上攻心腹腰背皆痛或疝氣連睪丸痛木香馬藺草醋炒茴香川楝子炒各一兩共為末每服四錢滾酒下連進二服其痛即止阿膠散治肺虛咳嗽咯血牙香三兩炒阿膠一兩蛤粉炒成珠為末每服三錢薑湯下日三次定風散治破傷風及洗頭牙槽等風牙關緊急項背強直角弓反張若一二日者服此可治五七日者難治須急灸臍下三百壯川烏炮二兩防風二兩雄黃一兩共為末每服四錢水煎和渣服日三次出汗愈安蟲散治蟲攻心痛吐清水如蟯蟲發則腹脹寸白蟲則心痛並治之乾漆炒至煙盡五錢鶴蝨炒淨雷丸切炒各一兩共為末每服二錢小兒一錢米湯下檳榔丸治小便淋澀不通及血淋石淋檳榔芍藥苦楝子炒馬藺花各一兩共為末每服四錢酒煎熱服換骨散治癩風面上黑腫肌肉頑麻手足疼痛遍身生瘡先灸五臟俞穴後服此藥烏蛇去頭尾酒煮取肉白花蛇同上製法石菖蒲荊芥穗蔓荊子天麻酒炒胡首烏小黑豆拌蒸曬白楊樹皮炒各二兩甘草炒地骨皮酒炒枳殼麩炒杜仲鹽水炒當歸酒炒川芎酒炒牛膝鹽水炒各一兩共為末每服二錢酒下胡麻散治癘風渾身頑麻或如針刺遍身疼痛手足癱瘓紫背浮萍七月半採一斤黑芝麻炒四兩薄荷蘇州者佳二兩牛蒡子炒甘草炒各一兩共為末每服三錢茶酒任下日三服消癭散治氣癭多服取效血癭不治全蠍三十枚去頭足豬羊靨即膝眼骨各三十枚炙枯枯礬五錢共為末蜜丸梧子大每服五十丸飴米糖拌吞或茶任下補宮丸治女人子宮久冷經事不調致小腹連腰痛面黃肌瘦四肢無力減食發熱夜多盜汗下赤白帶久服且能多子當歸酒炒熟地薑汁炒肉蓯蓉酒洗去膜菟絲子製法見前牛膝酒洗各二兩肉桂沉香蓽茇去蒂炒吳茱萸去梗肉果各一兩真血竭艾葉各五錢共為末醋糊丸梧子大每服五十丸或酒或白湯任下膠艾湯治婦人衝任虛損月水不調子宮久冷腰腹疼痛赤白帶下或惡露不止此藥能通經絡活死血生新血阿膠蛤粉炒成珠艾葉當歸白芍川芎熟地各二兩甘草乾薑各五錢共為末每服四錢水煎和渣熱服戒怒氣一月地血散治婦人心血間有熱飲食不減起居如常但發煩熱茜草當歸白芍烏梅柴胡知母各一錢每劑加薑三片水煎溫服大青膏治小兒吐瀉後成慢驚脾虛發搐或斑疹後發搐烏蛇去頭尾酒浸炙全蠍十枚去頭足蜈蚣五條去頭足炙鍾乳粉要真者火煅研極細末水飛淨五錢青黛丁香木香川附子制各五錢白附子麵包煨熟一兩共為末蜜丸龍眼大每服一丸滾水下連進二服立瘥甚者灸中脘五十壯碧霞散治痰涎壅盛卒僕或發驚搐一切急症服此吐痰豬牙皂角炙去皮弦銅青另研大黃生用金線重樓即金線釣蝦蟆製法見後各五錢上為末每服一錢小兒三五分白湯灌下牙關緊者鼻中灌下吐痰立愈萬靈膏治小兒疳瘦腹脹水瀉多消香附一兩青皮川黃連肉桂巴豆去油砂仁肉果各五錢上為末醋糊丸黍米大每用三五七丸溫水下育嬰丹治小兒面黃肚大青筋作瀉及五疳諸積健脾進食上好白蠟一兩二錢入銚頓化傾入碗內七次硃砂飛淨一錢心疳用之赤石脂一錢火煅脾疳用之青黛一錢肝疳用之寒水石一錢用泥罐上下蓋定火煅肺疳用之牡蠣一錢火煅腎疳用之先將白蠟研碎後加各經引藥共研細末分作十帖每用雞蛋一枚開一小孔去黃留清入藥一帖攪勻紙封口或蒸或用火煨任意食之酒飯無忌抑青餅治小兒驚風清膈化痰降熱火防風薄荷桔梗炒各一兩甘草炙青黛淨各五錢冰片四分共為末蜜丸芡實大或捏作餅薑湯下硃砂丸治小兒膈熱消痰半夏制辰砂各五錢杏仁三十粒去皮共為末蒸餅丸梧子大每服十丸或五七丸食後薄荷湯下醒脾丸治久瘧不瘥川烏五兩薑汁浸去黑皮切片大蒜三兩煨去皮共為末醋糊丸梧子大每服二十丸米飲下小兒量減奪命丹治中風左癱右瘓半身不遂口眼喎斜言語謇澀川烏酒煮蒼朮米泔浸各四兩共為末酒糊丸梧子大空心服十五丸忌見風暖蓋出汗脫衣散治汗斑及紫白癜風附子硫黃各五錢共為末薑汁調以茄蒂蘸擦三四次全愈百花散治腿肚血風臁瘡小兒螻蛄癤或耳底出膿瘰癧痔漏川烏五兩搗為末凡一切瘡毒以麻油調塗濕者干糝耳中出水吹入牛馬六畜瘡皆可治人家合醬入此末五錢不生蟲蛆附金線重樓治證金線重樓俗名金線釣蝦蟆採得去外黑粗皮用石頭打碎勿見鐵器曬乾為末小罐收貯凡一切要吐痰涎之證用代瓜蒂最妙一治風痰結胸用一錢陰陽水和服吐去痰即愈一治傷食成瘧疾者用一錢臨發空心水和服一吐即愈一治禁口痢疾涼水和服一錢吐痰即愈服金液丹各證引藥虛勞白湯下或薑湯下骨蒸潮熱地骨皮湯或炒胡黃連五分煎湯或丹皮湯下吐血茅根湯或藕節湯下消渴烏梅湯或石膏湯下肺脹真蘇子湯下中滿陳皮湯或木香湯或芥菜湯下水腫車前子湯或木通湯下休息痢白者用臭椿根皮湯下紅者用雞冠花湯下脾泄車前子炒焦煎湯下注下木通湯下大便閉芒硝煎湯下小便閉木通湯下尿血山梔木通湯下或燈心竹葉湯下霍亂藿香湯下吐瀉生薑燈心湯下尸厥薑湯下氣厥真蘇子湯下陰證附子湯下陰毒黃耆湯或附子湯下目中內障木賊菊花湯下心下作痞枳實桔梗湯下心胃痛延胡索湯或酒下胃寒米穀不化乾薑麥芽湯下兩脅急痛青皮湯下肚腹痛甘草白芍湯下臍腹痛麥芽湯下小腹痛小茴香湯下膀胱疝氣小茴桔核湯下女人子宮虛冷薑湯下赤帶地榆湯下白帶樗白皮湯或白果炒煅煎酒下小兒急驚風金銀花湯下慢驚風人參湯下一切疑難之證俱用薑湯下昔人稱金液丹有起死回生之功真是救危神劑然亦有戒人服餌者如蘇頌之本草圖經寇宗奭之本草衍義一言其為效雖捷為患亦速一言其人但知用之為福而不知為禍蓋亦有所鑑而云世人於此疑而不敢服者多矣然余常見二人年少時皆荒耽於色至五十外皆患虛損服參附渺若不知有勸餌硫黃者二人皆服皆有效一人不能節欲閲五六年竟以氣脫而殞一人能止欲至八十餘始卒此目所親擊者也夫藥以治疾有是疾必得是藥而後愈許叔微所謂形有寒邪雖嬰孩亦可服金液藏有熱毒雖羸老亦可服大黃至哉通變之説理不妄也但中病則已久服或致偏勝之患凡藥皆如是豈特金液丹哉其或服之終身反致壽考此其稟受特異餘人非可概論若夫元氣未衰陰精先耗此藥實非所宜更或漁色之徒朝餐夕餌不以此為治疾之良劑而以此為逞欲之單方自戕其生而不之懼卒乃歸咎於金液丹之不可餌然則鑑人之傷食而並議稻麻菽麥之不宜餐鑑人之傷飲而並疑酒漿茗汁不可啜豈理也哉因憶書册中所載服硫黃而受益者採摘數條附録於後以示來者夷堅志云唐與正知醫遇人有奇疾多以意治之從舅吳巡檢病不得前溲臥則微通立則涓滴不下醫人遍用通利小腸諸藥窮技巧勿驗其侄孫來問吳常日服何藥曰常服黑錫丹問何人結砂曰自為之唐灑然悟曰此繇結砂時鉛不死硫黃飛去鉛砂入積膀胱膀胱臥則偏重故猶可溲立則正塞水道以故不能通乃取金液丹三百粒分為十服煎瞿麥湯下之膀胱所積之鉛得硫黃皆化成灰自水道下猶纍纍如細砂病遂愈類編云仁和縣一吏早衰病瘠齒落從貨藥道人得一方碾生硫黃為細末入豬臟中水煮臟爛入蒸餅丸如梧子大隨意服之兩月後飲啖倍常步履輕捷年逾九十略無老態執役如初因從邑宰入村醉食牛血遂洞下數十行所泄如金水頓覺尫悴少日而死李巨源得其事於臨安入宮醫官管範嘗與王樞使言之王曰嘗聞豬肪脂能制硫黃茲用豬臟尤為得理樞使亦合服之久亦見效本草通元云壬子秋余應試北雍有孝廉張抱赤久荒於色腹滿如斗以參湯吞金匱丸小便差利滿亦差減閲旬日而滿腹如故肢體厥逆仍投前藥竟無裨也舉家哀亂惟治終事抱赤泣告曰若可救我當終身父事之余曰能餌金液丹數十粒雖不敢謂萬全或有生理抱赤連服百粒小便遄行滿消食進更以補中八味並用遂獲痊安故夫藥中肯綮如鼓應桴世之病是證而不得援者衆矣有如抱赤之傾信者幾人哉且硫非治滿之劑特以元陽將絶參附無功藉其純陽之精令陰寒之滯見晛冰消爾神治諸般風氣靈膏紅砒一斤入罐化汁用金頭蜈蚣全蠍末投砒內以砒不起煙為度又以砒用槐角子一斗煮三晝夜水乾為度上以土築實封固火煅鍋通紅死砒脆白化成汁用砒一兩配前金液硫一兩共研為末攤於膏藥貼患處汗斑神效方黑芝麻一撮鹼汁半杯按字書無鹼字系俗人所造正寫當作鹼字將芝麻研細入鹼汁煎數沸搽之即愈跋扁鵲心書三卷及神方一卷宋紹興中開州巡檢竇材所集録已嘗鋟板行世而歲久湮沒人間少有見者古月老人得之詫為奇書祕册寶藏不啻在琅函玉笈中老人精醫理於古今方論剖析疑似指斥訛謬皆合軒岐正義遇危急之疾他人縮手告難老人治之往往奏效年五十外又得此書嗣後治人痼疾益多奇驗沒後其子道周繼其業嘗手其書示余曰思欲重刊以傳於世而家貧乏力遲之十餘年竟不克刊道周亦沒歷今又十餘年見其孫紀云語及是書因出其祖手録副本見示上有參論百餘條拾遺補闕可謂竇氏功臣第字句不無訛錯邊方亦有蠹蝕問前者所見原本則歸橫塘一藏書家余深以不得再見為歉又恐此本久亦湮沒不存爰加較勘即以參論諸條附注其下以付剖劂一以恩故人昔日見示斯編之意一以使奇方要訣流傳世上後人用之得以起沉疴而保天年為益甚無窮也回思數十年前與古月老人父子相晤語宛然疇昔事歲月如馳兩人墓木已拱不獲親見是書重刊為可嘆也老人名珏字念庵因姓胡氏故自號古月老人乾隆乙酉二月丁丑朔紫陽山民王琦書竇氏材生於宋之中葉而書中有河間丹溪遺訛後世之語又鍾乳粉方下訾丹溪多服發渴淋之説為謬又言製法見時珍本草何緣舉元明人之書而及之其為後人增益無疑兼知是編非竇氏原本矣仲景傷寒論古今奉為不刊之典竇氏顧有指摘其未當者數條蓋由膠執其詞未嘗融貫以參領其活潑之用致意見有差池耳再後人自當分別觀之能鑑其是更能正其非判然不惑斯為善讀古書者人稟陰陽二氣以成此身身之內皆二氣所充周也互以相生因以相濟而無過與不及之相陵是以內外和平而無疾病有疾病者反是治之者扶陽保陰各視其攸宜損之益之以期於至當而無偏焉是書重在扶陽或者疑其不免偏見然余嘗觀天地間日月盈虧寒暄遞運雨晹時若草木盛衰而信陽常有餘陰常不足乃造化自然之樞機若夫陽常有餘而藝生不厭其有餘陰常不足而藝生不苦其不足以此悟扶陽之理視保陰為尤要者亦本造化當然之軌則竇氏之書以灼艾為第一餌丹藥為第二用附子為第三傳此三法以為保命真訣洵千古不磨之法何庸排訾其非哉其議論張王以下六子也非務為好辨以矯異也序中已明言學六子之書以調治小疾百發而百中特以數十種大病垂危之證非其書中所載諸方可能救療而別有救療之方而言也惟是藥與人有宜不宜之殊方與證有對不對之異於古書能善讀者又貴能善用苟僅能見其外之形似而未能察其內之神機惘惘然執紙上陳言而嘗試之一有不當人且乘其間而議是書扶陽之法為誤而不可遵循矣嗟嗟扶陽正理何誤之有因用者之不當而並咎昔人立言之誤吾恐斯人之學亦誤於保陰之説夭枉天下蒼生更多而曾不自覺也可勝嘆哉二月十三日己丑琢崖又書雕板未竣或有阻余者曰陶節庵録成家祕的本戒其子勿以示人恐淺陋者妄肆詆諆子珍是編什襲而藏之擇其人示焉可矣胡事鐫梨刻棗以昭示於世不慮淺學之徒是非鋒起或加塗抹而為是書瘡痏與余曰人心各異所見不同於是書而非之或塗抹之如吾子所言固有矣然豈無重之珍之更欲重刊之如古月老人父子者乎昔華他能剖割積聚湔洗腸胃其方書焚燬不傳後人以為恨然使其書尚存恐謂其誕妄不經者必多孰敢有信而用者今竇氏之書寧獨異於華氏之書耶余幸其得存於今也亟重刊之化一帙為千百帙冀其長留天地間而不至澌滅無傳後人得之或有信而用者此之起死扶衰通閉解結而反之於平則是書實博施濟衆之良書其為有功於蒼赤豈少哉彼執偏滯之見平居則嘖有煩言於扶陽之理肆為排擊臨險證則袖手倣徨莫之能救其學之優劣可一覽而知其言之是非曾何足為重輕乎二月二十六日壬寅琢崖又書
