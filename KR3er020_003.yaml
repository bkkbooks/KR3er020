body:
  text: 卷中傷寒傷寒六脈浮緊呻吟不絕足指溫者陽也忌服涼藥恐變為陰害人性命至六日發煩躁乃陰陽換氣欲作汗也服當歸茯苓散汗出而愈六脈緊大或弦細不呻吟多睡耳聾足指冷肢節痛發黃身生赤黑靨時發噫氣皆陰也灸關元三百壯服金液丹姜附湯過十日半月出汗而愈若不早灸反與涼藥者死辨別陰陽不止於此然熟體此二條則治傷寒證誤謬亦少其灸法雖不能遍行若貧家無力而遇難起之病不能備參藥勉告以灸能活命倘肯依從未必非仁術之一端予每見時疫盛行之際鄉陬死者比戶心切憐之倘盡心力併合丹藥以濟之不特己身蒙福子孫亦必昌大若吐逆而心下痞灸中脘五十壯若微微發顫者欲作汗服姜附湯而愈若少年壯實之人傷寒至五六日發狂逾垣上屋胃中有積熱也服大通散輕者知母散亦愈傷寒四經見證傷寒只有四經無少陽厥陰二經夫寒之中人如太陽主皮毛故寒邪先客此經陽明主胃凡形寒飲冷則傷之太陰主脾凡飲食失節過食寒物則傷之少陰主腎寒水喜歸本經也故傷寒止有四經若少陽厥陰主肝膽如憂思喜怒方得傷之寒病最少如耳聾囊縮者少陰也寒熱口苦乃陽病也此四證俱不宜用寒涼藥也言無少陽厥陰二經非通論也時醫見寒熱口苦耳聾脅痛乾嘔吐逆不辨陰陽不審虛實動云少陽首尾小柴胡和解以為穩妥不知虛陽提越內陰愈甚變為躁擾不安胸膈痞悶口渴譫妄脈體弦急更云內熱已深輕則瀉心白虎重則陷胸承氣不至冰脫不已至若厥陰標陰本風中見火化證來錯雜人多不識誤死者多矣太陽見證太陽寒水內屬膀胱故脈來浮緊外證頭疼發熱腰脊強惟服平胃散至六七日出汗而愈蓋胃氣不虛傳遍經絡自愈也仲景以為陽證乃與涼藥隨經而解反攻出他病甚者變為陰證六脈沉細發厥而死急灸關元乃可復生如本經至六七日發戰者欲作解而陽氣少也服姜附湯出汗而愈仲景圓機活法論中救誤者甚多何嘗能誤人哉其誤人者乃後人誤用仲景法而誤之耳於仲景何尤陽明見證陽明燥金內屬於胃六脈浮緊而長外證目痛發熱手足溫呻吟不絕服當歸柴胡湯平胃散仲景反言熱深厥亦深此誤也若果發昏厥兩目枯陷不能升者急灸中脘五十壯漸漸省人事手足溫者生否則死仲景厥陰證中有厥熱多寡之論不過驗邪正之進退察陰陽之消長示人為治之活法無偏無倚何誤之有太陰見證太陰濕土內屬於脾其脈弦緊外證不呻吟四肢不痛身不甚熱時自汗自利手足冷多痰唾服保元丹姜附湯十日後汗出而愈此證溫治若早愈亦甚速稍不審察害人亦易又一證發黃生紫斑咽乾燥噫氣者此名陰燥陰黃服鍾乳粉十日後汗出而愈庸醫或誤認陽證涼之即死少陰見證少陰君火內屬於腎其脈弦大外證肢節不痛不呻吟但好睡足指冷耳聾口乾多痰唾身生赤黑靨時發噫氣身重如山煩躁不止急灸關元三百壯內服保元丹姜附湯過十日汗出而愈若作陽證誤服涼藥以致發昏譫語循衣摸床吐血脈細乃真氣虛腎水欲涸也仲景反曰急下之以救腎水此誤也真氣既虛反用涼藥以攻其里是促其死也急灸關元三百壯可保無虞少陰本熱標寒而又中見太陽本熱之證固不易治況標陰為病千頭萬緒變態百出令人接應不暇然只在初時體察真切用灸用溫亦非難事良由初著一錯貽誤到底害人不少至若無本熱而又無中見之太陽一派陰寒必死無疑或速灸關元重投丹附亦在於覺之早庶望其生少陰誤治而變諸敗逆證誠為費手先生之論專屬形臟故尚溫補仲景之論惟言氣化故主承製然論中用溫者多下者不過數條而已況標本氣化今古難明非神於仲景之法者不能倘於急下證而誤溫殺人反掌急溫證而誤下冤沉海底嗟嗟醫之為道誠難矣傷風傷寒脈浮為風脈緊為寒仲景分為兩塗故有麻黃桂枝之說此誤也然傷寒乃太陽本氣受傷不可大汗但服姜附湯自愈不必穿鑿他求以為精也浮風緊寒古人通論解肌發表定法難磨仲景不可訾也至若緊而勁急或微或沉神志稍失其常形氣不能振作則先生之法斷不可緩傷風輕淺之證初起咽疼喉痛鼻中火出此風邪外傷毛腠抑遏陽氣故現此耳醫者不明誤用寒涼馴致重大挾食冷物脈沉為胃氣寒緊為冷氣盛滑則食不消其證頭痛發熱嘔吐心下痞時或腹痛服丁香丸來復丹若冷物不消蓽澄茄散胃虛者平胃散理中丸中濕三四月間人感潮濕之氣名曰濕病或六七月大雨時行恣飲冰水冷物亦名中濕則令人寒熱自汗陽則脈緊肢節痛足指溫服朮附湯陰則脈沉而緊肢節不痛身涼自利足指冷服姜附湯不可發汗汗則必發煩躁虛汗不止或發黃腫若服涼藥則泄瀉而死先生於此證雖分陰陽而用附子則一今人於六七月之交不辨是寒是濕或陰或陽動輒云暑專用寒涼及至發腫瀉泄而猶云暑毒未清又行攻下不至醫殺不止實可痛心陰毒或腎虛人或房事後或胃發冷氣即腹痛煩躁甚者囊縮昏悶而死急灸關元一百壯內服姜附湯保元丹可救一二若遲則氣脫雖灸亦無益矣審證的確即當速救不可因循致歸絕路老人傷寒切忌發汗及吐下蓋元氣盛則邪不能為害傳遍經絡自愈仲景不敢補反攻邪氣致正氣受傷誤人多矣凡遇此證只用姜附湯多服自然解散元虛而受攻傷正何必老人仲景醫之聖者寧不知此陰陽換氣凡傷寒陽證欲作汗陰證已加灸真元欲復與邪氣分爭必發寒戰鼻衄昏迷牙關微緊四肢微厥乃陰陽換氣也一二時辰自然腋下汗出而愈陰陽換氣即今之所謂戰汗須預告病家令其不必驚駭否則闔室蒼惶讒言蜂起彼時一劑誤投遂有生死之判傷寒譫語凡傷寒譫語屬少陰仲景屬陽明誤也陽明內熱必發狂今止譫語故為少陰仲景皆指神虛未嘗不屬少陰也急灸關元三百壯若灸後仍不止者死傷寒衄血凡鼻衄不過一二盞者氣欲和也不汗而愈若衄至升斗者乃真氣脫也針關元入三寸留二十呼血立止再灸關元二百壯服金液丹不然恐成虛勞中滿當解當清當溫當補審證施治庶幾無誤勞復傷寒瘥後飲食起居勞動則復發熱其候頭痛身熱煩躁或腹疼脈浮而緊此勞復也服平胃散分氣丸汗出而愈若連服三四次不除者此元氣大虛故也灸中脘五十壯勞復證仲景數方用須斟酌第一須審邪氣之有無辨寒熱之多寡以施治則無誤矣汗後大便下赤水或膿血此乃胃中積熱未除或服丹附而致宜服黃連當歸芍藥湯下膿者如聖餅化積而愈經云熱雖甚不死若陰氣盛則殺人於頃刻戒之熱藥之過一涼可解涼藥之誤十熱難瘳又積熱易解而易治沉陰難愈而難明臨證之工大宜體認汗後發噫由於脾腎虛弱冷氣上奔也服姜附湯來復丹此症當是發呃若噫證無死人之理觀後二案可見治驗一人傷寒至八日脈大而緊發黃生紫斑噫氣足指冷至腳面此太陰證也最重難治為灸命關五十壯關元二百壯服金液丹鍾乳粉四日汗出而愈一人患傷寒至六日脈弦緊身發黃自汗亦太陰證也先服金液丹點命關穴病人不肯灸傷寒唯太陰少陰二證死人最速若不早灸雖服藥無效不信至九日瀉血而死不聽良言往往至此及至證變而下血俗醫猶謂硫黃熱迫痛為排擠反用寒涼以下石至死眾口呶呶總咎熱藥之害婆心遭謗不一而足然有天道何恤人言一人病傷寒至六日微發黃一醫與茵陳湯次日更深黃色遍身如梔子此太陰證誤服涼藥而致肝木侮脾余為灸命關五十壯服金液丹而愈傷寒發黃雖有陰陽之異然脾家陰濕而為陰黃者多不可不知一人患傷寒初起即厥逆脈一息八九至諸醫以為必死余曰乃陰毒也與姜附湯一盞至半夜汗出而愈若以脈數為熱下涼藥必死無疑俗醫視此必以為痧證禁服官料藥專行焠刺縱飲冷水不致冰脫不已肺傷寒肺傷寒一證方書多不載誤人甚多與少陰證同但不出汗而愈每發於正二臘月間亦頭疼肢節痛發熱惡寒咳嗽脈緊與傷寒略同但多咳嗽耳不宜汗服姜附湯三日而愈若素虛之人邪氣深入則昏睡譫語足指冷脈浮緊乃死證也急灸關元三百壯可生不灸必死服涼藥亦死蓋非藥可療也肺傷寒之證今人多認為重傷風非溫平誤事即寒涼殺人予於此證略有分曉然不免因人檢點苟遇知己用之無疑應酬通治不過姜甘桂辛而已設概用姜附往往遭人謗毀治驗一人患肺傷寒頭痛發熱惡寒咳嗽肢節疼脈沉緊服華蓋散黃耆建中湯略解至五日昏睡譫語四肢微厥乃腎氣虛也灸關元百壯服姜附湯始汗出愈此證與雍正六年自春徂夏時氣大同時俗皆禁服藥藥則有誤不知非藥誤人乃庸人不明此理妄投涼藥之誤耳苟具隻眼焉得有誤疽瘡有腰疽背疽腦疽腿疽雖因處以立名而其根則同方書多用苦寒敗毒之藥多致剝削元氣變為陰疽侵肌蝕骨潰爛而亡不知內經云脾腎氣虛寒氣客於經絡血氣不通著而成疾若真氣不甚虛邪氣不得內陷則成癰蓋癰者壅也血氣壅滯故大而高起屬陽易治若真氣虛甚則毒邪內攻附貼筋骨則成疽蓋疽者阻也邪氣深而內爛阻人筋骨屬陰難治其始發也必憎寒壯熱急服救生湯五錢再服全好甚者即於痛處灸三五壯陰疽即三五十壯亦不為過如痛者屬陽易治若不痛乃疽瘡也急服保元丹以固腎氣若用涼轉藥則陽變為陰或不進飲食而死急灸關元可生近世瘍醫只記一十三味方不問邪之深淺感之重輕頂之起不起色之紅不紅不辨五美不審七惡概用此方更加涼解即見純陰冷毒而猶云半陰半陽總以發散解毒為良法及至寒涼冰伏尚云毒盛內攻或見神情躁擾終認火熱未清小證變大淺證變深若遇大證未有不受其害者世謂外科拉折腿醫亦不盡然人之無良亦或有之其餘實由學問未精識證不確陰陽錯亂虛實混淆變證之來全然不曉有似故意害人其實非本心也治驗一人病腦疽六日危篤不進飲食余曰年高腎虛邪氣滯經也令服救生湯即刻減半夜間再進一服全安一人忽患遍身拘急來日陰囊連莖腫大如斗六脈沉緊余曰此陰疽也幸未服解毒涼藥若服之則莖與睪丸必皆爛去而死急令服救生湯五錢又一服全安一老婦腦後作痛憎寒拘急余曰此欲發腦疽也急服救生湯三服全愈余治一婦新產深居密室頭面遍體生札馬疔外科與清火敗毒藥二劑立時消去其家甚喜次日胸中氣悶渴燥不已神氣異常至晚腹痛泄瀉身熱體倦嘔惡不食瘍醫云暑毒內攻更與連梔涼劑煎訖將進適余至診其脈空散無根一息七八至乃里虛毒陷也即以異功加姜附飲之次日瀉止神清食粥不嘔又一劑而札馬疔仍復發出亦不如前之痛苦矣夫札馬疔小疾耳涼解一誤尚變脫陷況大毒乎記此以為瘍醫寒涼之戒精方脈者亦不可不明此理凡一切癰疽發背疔瘡乳癰癤毒無非寒邪滯經只以救生湯服之重者減半輕者全安百發百中喉痹此病由肺腎氣虛風寒客之令人頤頷粗腫咽喉閉塞湯藥不下死在須臾者急灌黃藥子散吐出惡涎而愈此病輕者治肺服姜附湯灸天突穴五十壯亦好重者服鍾乳粉灸關元穴亦服姜附湯治驗一人患喉痹痰氣上攻咽喉閉塞灸天突穴五十壯即可進粥服姜附湯一劑即愈此治肺也一人患喉痹頤頷粗腫粥藥不下四肢逆冷六脈沉細急灸關元穴二百壯四肢方暖六脈漸生但咽喉尚腫仍令服黃藥子散吐出稠痰一合乃愈此治腎也一人患喉痹六脈細余為灸關元二百壯六脈漸生一醫曰此乃熱證復以火攻是抱薪救火也遂進涼藥一劑六脈復沉咽中更腫醫計窮用尖刀於腫處刺之出血一升而愈蓋此證忌用涼藥痰見寒則凝故用刀出其肺血而腫亦隨消也先生治肺治腎之法千古卓見況咽喉之證風火為患十有二三肺腎虛寒十有八九喉科不明此理一味寒涼即有外邪亦致冰伏若元本虧損未有不閉悶致死者所以咽喉妙法第一開豁痰涎痰涎既湧自然通快然後審輕重以施治姜附灼艾誠為治本之法但人多畏之而不肯用耳然當危急時亦不可避忌強為救治亦可得生也至於刺法亦須知之雍正四年咽喉證甚行友人之子沈禮庭亦患喉痹次日即爛予診其兩寸無力兩尺空散乃陰虛火動以七味丸作湯與服一劑證雖未減而痛勢少緩鄰家強其延喉科視之彼醫笑予動輒用熱藥不知此乃陽明熱甚證火性急速故一日而喉即腐潰豈可用溫補劑耶乃投白虎二劑服未半而神氣改常語言錯亂甚至顛倒不眠其家惶急復延予予診其脈亂而八九至予曰果病陽明燥火石膏實為良劑今系無根之焰而妄用白虎使胃絡陷下而不能上通故心神失守以歸脾湯加桂飲之甫一劑而神恬脈靜矣噫彼喉科一無學之人妄為評品大方亂投湯藥幾至殺人亦愚矣虛勞此病由七情六慾損傷脾腎早尚易治遲則難愈必用火灸方得回生若用溫平藥及黃耆建中鱉甲飲之類皆無益於病反傷元氣其證始則困倦少食額上時時汗出或自盜汗口乾咳嗽四肢常冷漸至咳吐鮮血或咯血多痰蓋腎脈上貫肝隔入肺中腎既虛損不能上榮於肺故有是病治法當同陰證治之先於關元灸二百壯以固腎氣後服保命延壽丹或鍾乳粉服三五兩其病減半一月全安若服知柏地黃當歸之屬重傷脾腎是促其死也切忌房事然此病須早灸遲則無益丹藥亦不受矣服之反發熱煩乃真脫故也若童男女得此病乃胎秉怯弱宜終身在家若出嫁犯房事再發必死治驗一人病咳嗽盜汗發熱困倦減食四肢逆冷六脈弦緊乃腎氣虛也先灸關元五百壯服保命延壽丹二十丸鍾乳粉二錢間日服金液丹百丸一月全安一人病咳嗽證脈與上條同但病人怕灸止服延壽丹五十粒金液丹百粒鍾乳粉二兩五日減可十日脈沉緩乃真氣復也仍服前藥一月全安蓋此病早治不灸亦可遲必加灸否則難治一幼女病咳嗽發熱咯血減食先灸臍下百壯服延壽丹黃耆建中湯而愈戒其不可出嫁犯房事必死過四年而適人前病復作余曰此女胎稟素弱只宜固守終老不信余言破損天真元氣將脫不可救矣強余丹藥服之竟死一人額上時時汗出乃腎氣虛也不治則成癆瘵先灸臍下百壯服金液丹而愈一人夜多虛汗亦腎氣虛也服全真丹黃耆建中湯而痊一婦人產後虛汗不止乃脾腎虛也服金液丹全真丹當歸建中湯而愈凡童男女秉氣虛多汗者亦同此治一人每日四五遍出汗灸關元穴亦不止乃房事後飲冷傷脾氣復灸左命關百壯而愈一婦人傷寒瘥後轉成虛勞乃前醫下冷藥損其元氣故也病人發熱咳嗽吐血少食為灸關元二百壯服金液保命四神鍾乳粉一月全愈脾腎者先後天之本與元也虛勞之病雖有五臟之殊其原皆由於脾腎受病而脾腎之治殊難見效不知腎之元於生陽脾之本於焦火溫溫不息元本日充自然真水流行津液四布神精內守煙焰不生五臟無偏頗之虞水火有交濟之益何難治之有哉奈何世人不察習用寒涼不敗不已間有知脾腎之當保者不過玉竹沙參生脈六味溫平之劑而已知先生之法者有幾人哉但恨起石無真鍾乳多偽合丹救濟亦屬徒然惟有艾火庶可求全人又不肯耐疼忍痛應名數痏此證之獲愈者所以千百而無一二也予具熱腸動違庸俗明知難起之疾勉投桂附十中亦起一二其終不愈者不免多口之來予亦無庸置辨彼蒼者天諒能默鑑予救世之衷也因略舉治愈數人附記於後以為吾黨型式俾知溫補之可以活人而不為流俗所惑不因讒毀縮手也友人沈蔭昌兄因患伏免疽膿血過多有傷元本變為虛勞服滋陰劑過多喘急吐血飲食少進予診之脈弦急有七八至面色純青喘咳氣急臥難著席身熱汗出涎沫不收虛脫之證已悉見矣又貧乏無力用參乃予建中重投耆桂一服而喘定安眠涎沫與血俱減大半第病久而脾腎過傷胃氣難復投桂附加參錢許月餘而痊王在庭之室病虛勞十餘載喘促吐沫嘔血不食形體骨立諸醫束手延予診視見其平日之方皆滋陰潤肺溫平之劑予曰以如是之病而乃用如是之藥自然日趨鬼趣焉望生機獨不思仲景云咳者則劇數吐涎沫以脾虛也又昔賢云腎家生陽不能上交於肺則喘又云脾虛而肺失生化之原則喘今脾腎敗脫用藥如此焉望其生乃重投參耆姜附等二劑而喘定緣泄瀉更甚再加萸蔻十餘劑而病減十七又灸關元因畏痛只灸五十壯迄今十餘年而形體大健矣一中年婦夜熱咳嗽本小疾耳為張李二醫合用滋陰退熱藥月餘致面青脈急喘促吐血嘔沫日數升飲食不進二醫束手覆而不治予為重用參附十餘劑而安此非其本原受虧乃藥誤所致故收功易也中風此病皆因房事六慾七情所傷真氣虛為風邪所乘客於五臟之俞則為中風偏枯等證若中脾胃之俞則右手足不用中心肝之俞則左手足不用大抵能任用但少力麻痹者為輕能舉而不能用者稍輕全不能舉動者最重邪氣入臟則廢九竅甚者卒中而死入腑則壞四肢或有可愈者治法先灸關元五百壯五日便安次服保元丹一二斤以壯元氣再服八仙丹八風湯則終身不發若不灸臍下不服丹藥雖愈不過三五年再作必死然此證最忌汗吐下損其元氣必死大凡風脈浮而遲緩者生急疾者重一息八九至者死中風之證古方書雖有中臟中腑中經脈之別然其要不過閉證與脫證而已閉證雖屬實而虛者不少或可用開關通竅行痰疏氣之劑關竅一開痰氣稍順急當審其形藏察其氣血而調治之更視其兼證之有無虛實之孰勝或補或瀉再佐以先生之法庶幾為效速而無痿廢難起之患矣至若脫證唯一於虛重劑參附或可保全然不若先生之丹艾為萬全也予見近時醫家脫證已具三四而猶云有風有痰雖用參附而必佐以秦艽天麻膽星竹瀝冰陷疏散是誠不知緩急者也烏足與論醫道哉治驗一人病半身不遂先灸關元五百壯一日二服八仙丹五日一服換骨丹其夜覺患處汗出來日病減四分一月痊愈再服延壽丹半斤保元丹一斤五十年病不作千金等方不灸關元不服丹藥惟以尋常藥治之雖愈難久一人患左半身不遂六脈沉細無力余曰此必服峻利之藥損其真氣故脈沉細病者云前月服捉虎丹吐涎二升此後稍輕但未全愈耳余嘆曰中風本因元氣虛損今服吐劑反傷元氣目下雖減不數日再作不復救矣不十日果大反復求治於余雖服丹藥竟不能起癘風此證皆因暑月仰臥濕地或房勞後入水冒風而中其氣令人兩目壅腫雲頭斑起或肉中如針刺或麻痹不仁腫則如癰疽潰爛筋骨而死若中肺俞心俞名曰肺癩易治若中脾肝腎俞名曰脾肝腎癩難治世傳醫法皆無效驗黃帝正法先灸肺俞二穴各五十壯次灸心俞次脾俞次肝俞次腎俞如此周而復始全愈為度內服胡麻散換骨丹各一料然平人止灸亦愈若爛見筋骨者難治經云脈風成為癧蓋風之中人善行而數變今風邪留於脈中淹纏不去而瘍風成矣其間有傷營傷衛之別傷營者營氣熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰傷衛者風氣與太陽俱入行於脈俞散於分肉之間與衛氣相犯其道不利故使肌肉膹䐜而有瘍此證感天地毒癘濁惡之氣或大醉房勞或山嵐瘴氣而成毒在氣分則上體先見毒在血分則下體先見氣血俱受則上下齊見更須分五臟之毒肺則皮生白屑眉毛先落肝則面發紫泡腎則腳底先痛或穿脾則遍身如癬心則雙目受損此五臟之毒病之重者也又當知五死之證皮死麻木不仁肉死割刺不痛血死潰爛目癱筋死指甲脫落骨死鼻柱崩壞此五臟之傷病之至重者難治若至音啞目盲更無及矣治驗一人面上黑腫左耳下起云紫如盤蛇肌肉中如刀刺手足不知痛詢其所以因同僚邀遊醉臥三日覺左臂黑腫如蛇形服風藥漸減今又發余曰非風也乃濕氣客五臟之俞穴前服風藥乃風勝濕故當暫好然毒根未去令灸腎俞二穴各百壯服換骨丹一料全愈面色光潤如故一人遍身赤腫如錐刺余曰汝病易治令灸心俞肺俞四穴各一百壯服胡麻散二料而愈但手足微不隨復灸前穴五十壯又服胡麻散二料全愈一人病癘證鬚眉盡落面目赤腫手足悉成瘡痍令灸肺俞心俞四穴各十壯服換骨丹一料二月全愈鬚眉更生風狂此病由於心血不足又七情六慾損傷包絡或風邪客之故發風狂言語無倫持刀上屋治法先灌睡聖散灸巨闕二三十壯又灸心俞二穴各五壯內服鎮心丹定志丸此證有陽明脈盛而為熱狂者清涼可愈也有暴折而難決為怒狂者奪其食則已治之以生鐵落飲二證皆狂之實者也然虛證常多不可誤治設一差訛害人反掌有心血不足而病者有腎水虧損而病者有神志俱不足而病者有因驚恐而病者有因妄想而病者是皆虛證體察而治斯無悖矣治驗一人得風狂已五年時發時止百法不效余為灌睡聖散三錢先灸巨闕五十壯醒時再服又灸心俞五十壯服鎮心丹一料余曰病患已久須大發一回方愈後果大發一日全好一婦人產後得此證亦如前灸服姜附湯而愈口眼喎斜此因賊風入舍於陽明之經其脈挾口環唇遇風氣則經脈牽急又風入手太陽經亦有此證治法當灸地倉穴二十壯艾炷如小麥粒大左喎灸左右喎灸右後服八風散三五七散一月全安此證非中風兼證之口眼喎斜乃身無他苦而單現此者是賊風之客也然有筋脈之異傷筋則痛傷脈則無痛稍有差別治法相同破傷風凡瘡口或金刃破處宜先貼膏藥以御風不然致風氣入內則成破傷風此證最急須早治遲則不救若初得此時風客太陽經令人牙關緊急四肢反張項背強直急服金華散連進二三服汗出即愈若救遲則危篤額上自汗速灸關元三百壯可保若真氣脫雖灸無用矣此證所患甚微為害甚大雖一毛孔之傷有關性命之急一人因拔髭一莖忽然腫起不食有友人詢余余曰此破傷風也速灸為妙瘍醫認作髭疔治以寒涼不數日發痙而死洗頭風凡人沐頭後或犯房事或當風取涼致賊風客入太陽經或風府穴令人卒僕口牙皆緊四肢反張急服姜附湯甚者灸石門穴三十壯此證若無房事之傷焉至於此慎之慎之牙槽風凡牙齒以刀針挑之致牙根空露為風邪所乘令人齒齲急者潰爛於頃刻急服姜附湯甚者灸石門穴腎主骨齒乃骨之餘破傷宣露風邪直襲腎經致潰爛於俄頃舍姜附而用寒涼為變可勝道哉水腫此證由脾胃素弱為飲食冷物所傷或因病服攻克涼藥損傷脾氣致不能通行水道故流入四肢百骸令人遍身浮腫小便反澀大便反泄此病最重世醫皆用利水消腫之藥乃速其斃也治法先灸命關二百壯服延壽丹金液丹或草神丹甚者姜附湯五七日病減小便長大便實或潤能飲食為效唯吃白粥一月後吃餅面無妨須常服金液丹來復丹永瘥若曾服芫花大戟通利之藥損其元氣或元氣已脫則不可治雖灸亦無用矣若灸後瘡中出水或雖服丹藥而小便不通皆真元已脫不可治也脈弦大者易治沉細者難痊治驗一人四肢皆腫氣促食則脹悶只吃稀粥余令日服金液丹百粒至四日覺大便滑再二日乃令吃麵食亦不妨蓋治之早也一婦人病面腳皆腫飲食減少世醫皆作血虛治之不效余曰非血病乃脾胃虛也令日服延壽丹十粒全真丹五十粒至十日覺大便滑病愈俞翰林母七旬余平日患咳喘痰紅常服滋陰涼潤之劑秋月忽患水腫喘急難臥日漸腫脹飲食少進進則氣急欲死諸醫用藥無效乃延予治六脈弦大而急按之益勁而空予曰此三焦火氣虛憊不能歸根而浮於外水隨氣奔致充郛郭而溢皮腠必須重溫以化否則不救彼云吾素內熱不服溫補片姜入口痰即帶紅先生所論故是第恐熱藥不相宜也予曰有是病服是藥成見難執且六脈緊大太陽已無根無根即脫矣此皆平日久股寒涼所致若再舍溫補不用恐無生理請辭彼云但不迫動血證敢不從命予以附桂姜萸十味人參三錢不三劑而腹有皺文八劑全消飲食如故又二劑而全愈痰喘吐紅舊證竟不發矣一婦因子遠出甕飧不給憂愁成病變為水腫喘急粥食不入者月餘矣友人見余談及此婦乃謂予曰肯做一好事否予曰既云好事焉敢違命遂偕往診見其六脈欲絕臍突腰圓喘難著席脾腎之敗不可為矣因處十味方命服四劑喘微定而腫漸消覺思飲食復診其脈微有起色又四劑而腫消食進矣嗟嗟若棄而不治雖不由我而死而實我殺之也友人亦大快臌脹此病之源與水腫同皆因脾氣虛衰而致或因他病攻損胃氣致難運化而腫大如鼓也病本易治皆由方書多用利藥病人又喜於速效以致輕者變重重者變危甚致害人黃帝正法先灸命關百壯固住脾氣灸至五十壯便覺小便長氣下降再灸關元三百壯以保腎氣五日內便安服金液丹草神丹減後只許吃白粥或羊肉汁泡蒸餅食之瘥後常服全真丹來復丹凡臌脹脈弦緊易治沉細難痊此病若帶四肢腫者溫之於早尚可奏功若單腹脹而更青筋浮露者難治苟能看破一切視世事如浮雲置此身於度外方保無虞次則慎起居節飲食遠房幃戒情性重溫急補十中可救二三先生之丹艾用之得宜其庶幾乎治驗一人因飲冷酒吃生菜成泄瀉服寒涼藥反傷脾氣致腹脹命灸關元三百壯當日小便長有下氣又服保元丹半斤十日即愈再服全真丹永不發矣暴注凡人腹下有水聲當即服丹藥不然變脾泄害人最速暴注之病由暑月食生冷太過損其脾氣故暴注下泄不早治三五日瀉脫元氣方書多作尋常治之河間又以為火用涼藥每害人性命治法當服金液丹草神丹霹靂湯姜附湯皆可若危篤者灸命關二百壯可保若灸遲則腸開洞泄而死脾泄之病世人輕忽時醫亦邈視之而不知傷人最速鹽商薛汝良午間注泄晡時即厥冷不禁及余診示已黃昏矣兩手脈皆絕予曰病已失守不可為矣速灸關元重投參附竟不能救先生之論誠非謬也治驗一人患暴注因憂思傷脾也服金液丹霹靂湯不效蓋傷之深耳灸命關二百壯大便始長服草神丹而愈休息痢痢因暑月食冷及濕熱太過損傷脾胃而致若傷氣則成白痢服如聖餅全真丹金液丹亦可若傷血則成赤痢服阿膠丸黃芩芍藥湯初起腹痛者亦服如聖餅下積血而愈此其輕者也若下五色魚腦延綿日久飲食不進者此休息痢也最重不早治十日半月害人性命治法先灸命關二百壯服草神丹霹靂湯三日便愈過服寒涼下藥必死痢至休息無已者非處治之瘥即調理之誤或飲食之過所以止作頻仍延綿不已然欲使其竟止亦頗費手有肺氣虛陷者有腎陰不足者有脾腎兩虧者有經脈內陷者有肝木乘脾者有腐穢不清者有固澀太早者有三焦失運者有濕熱傷脾者有生陽不足者有孤陰注下者有暑毒未清者有陰積腸蠱者有風邪陷入者一一體察得其病情審治的當自能應手取效治驗一人病休息痢已半年元氣將脫六脈將絕十分危篤余為灸命關三百壯關元三百壯六脈已平痢已止兩脅刺痛再服草神丹霹靂湯方愈一月後大便二日一次矣一人病休息痢余令灸命關二百壯病愈二日變泄下一時五七次令服霹靂湯二服立止後四肢浮腫乃脾虛欲成水脹也又灸關元二百壯服金液丹十兩一月而愈內傷由飲食失節損其脾氣輕則頭暈發熱四肢無力不思飲食脈沉而緊服來復全真及平胃散重者六脈浮緊頭痛發熱吐逆心下痞服蓽澄茄散來復全真而愈若被庸醫轉下涼藥重損脾氣變生他病成虛勞臌脹泄瀉等證急灸中脘五十壯關元百壯可保全生若服涼藥速死內傷之證飲食其一端也又有勞倦鬱怒憂悲思慮喜樂驚恐惡怒奇愁皆由七情不以次入直傷五臟更有由房室跌撲而成內傷者臨證之工不可不察霍亂霍亂由於外感風寒內傷生冷致陰陽交錯變成吐瀉初起服珍珠散二錢即愈或金液丹百粒亦愈如寒氣入腹搏於筋脈致筋抽轉即以瓦爿燒熱紙裹烙筋轉處立愈若吐瀉後胃氣大損六脈沉細四肢厥冷乃真陽欲脫灸中脘五十壯關元三百壯六脈復生不灸則死也霍亂之證三焦失運中土受傷一時心疼腹痛吐利頻作揮霍撩亂煩劇不寧大法溫其三焦調其中土一劑可愈至若厥冷無脈非重用溫補不可否則轉筋入腹而死近世時醫不雲中暑即言痧發禁用官料竟事涼冰刺其廉英針其曲澤以大泄其血不知脾胃受傷中焦之榮血已竭而復大泄之譬下井而投以石也此種醫人不顧人命真狼心虎腹人耶存救人之心者當須體察暑月傷食泄瀉凡暑月飲食生冷太過傷人六腑傷胃則注下暴泄傷脾則滑泄米穀不化傷大腸則瀉白腸中痛皆宜服金液丹霹靂湯三日而愈不愈則成脾泄急灸神闕百壯神闕恐是命關之誤難經雖言五泄不傳治法凡一應泄瀉皆依此法治之治驗一女人因泄瀉發狂言六脈緊數乃胃中積熱也詢其丈夫因吃胡椒生薑太多以致泄瀉五日後發狂言令服黃芩知母湯而愈平日恣啖炙爆喜食椒姜胃中積熱者有此一證臨證自明然亦希遇更有瀉脫津液致舌胎乾燥發熱神昏譫妄不寧者此脾胃大虛法當溫補若用寒涼虛脫立見痢疾凡人多食生冷濕熱傷其脾胃致成痢疾初起服如聖餅子下積而愈若無大便止下赤膿者乃胃有大熱傷血也宜當歸芍藥湯阿膠湯若下白膿者乃飲食冷物傷大腸也服桃花湯全真丹而愈若腹痛發熱昏睡六脈洪數純泄赤膿乃熱氣滯於腸胃也名疳蠱痢亦有錯服熱藥而得者服黃連丸甚者大通散痢疾固當化積清熱香連承氣等方用果得宜何嘗不應手而愈若涉脾胃虛寒經脈內陷三焦失運而致者又不可不以溫補為要也蓋熱藥之誤易於轉手涼藥之誤救治殊難虛衷以應臨證誤人自少傷脾發潮熱此因飲食失節損及脾胃致元氣虛脫令頭昏腳弱四肢倦怠心下痞悶午後發熱乃元氣下入陰分也服全真丹蓽澄茄散三月而愈若服滋陰降火涼藥其病轉甚若俗醫用下藥致病危篤六脈沉細灸中脘五十壯關元一百壯可保遲則脾氣衰脫而死庸醫於此證不知誤殺天下多少蒼生而小兒為甚午後發熱不曰潮熱便云陰虛心下痞悶不云食積便云停痰動輒寒涼恣行消克大人變為虛脫小兒轉為脾風而猶曰風暑難清痰熱為害及至垂斃醫者云人力已竭病家雲天數難挽至死不悟良可悲哉嘔吐反胃凡飲食失節冷物傷脾胃雖納受而脾不能運故作吐宜二聖散草神丹或金液丹若傷之最重再兼六慾七情有損者則飲蓄於中焦令人朝食暮吐名曰番胃乃脾氣太虛不能健運也治遲則傷人若用攻克重傷元氣立死須灸左命關二百壯服草神丹而愈若服他藥則不救嘔吐一證先當審其所因輕者二陳平胃藿香正氣一劑可定虛者六君理中亦易為力唯重者一時暴吐厥逆汗出稍失提防躁脫而死不可不知至於番胃雖屬緩證治頗棘手惟在醫者細心病人謹攝治以丹艾庶可獲全不然生者少矣痞悶凡飲食冷物太過脾胃被傷則心下作痞此為易治宜全真丹一服全好大抵傷胃則胸滿傷脾則腹脹腹脹者易治宜草神丹金液全真來復等皆可服寒甚者姜附湯此證庸醫多用下藥致一時變生腹大水腫急灸命關二百壯以保性命遲則難救此證乃內經所謂陽蓄積病死之證不可以誤治也若腹脹所謂藏寒生滿病是也苟不重溫危亡立至治驗一人因暑月食冷物以致胸腹脹悶欲死服金液丹百丸少頃加全真丹百丸即有氣下降而愈夏月伏陰在內一切冷物在所禁食若不慎而致傷者不重劑溫化惡得不變一小兒食生杏致傷脾脹悶欲死灸左命關二十壯即愈又服全真丹五十丸生杏在大人尚不可食況小兒乎溫中藥內入些少麝香為妙一人每飯後飲酒傷其肺氣致胸膈作脹氣促欲死服鍾乳粉五膈散而愈若重者灸中府穴亦好服涼藥則成中滿難治矣酒後吃飯中氣不傷若飯後飲酒清氣濁亂所以致脹一人慵懶飲食即臥致宿食結於中焦不能飲食四肢倦怠令灸中脘五十壯服分氣丸丁香丸即愈修養書云飯後徐徐行百步自然食毒自消磨食後即臥食填中宮升降有乖焉得不病中暑凡此病脈大而緩其候飲食不減起居如常但時發煩熱渴飲無度此暑證也易治知母散一服便愈若煩熱困倦不食者暑氣傷胃也服溫中湯藥即愈若服香薷六一寒涼等劑冰損胃氣多致變瘧痢泄瀉諸證慎之若暑氣客於心包絡之經令人譫言煩渴欲飲冷水小便秘澀大便下赤水當服阿膠丸當歸芍藥湯而愈若暑月飲食冷物寒邪入客胃中致腹中作痛宜金液草神全真來復等丹連二服便愈若以涼藥下之變為中滿脾泄若元氣虛早間行路冷氣入腹令人心肚作痛宜服金液丹或來復丹凡暑月人多食冷物若常服金液全真來復保元等丹自然脾胃調和飲食不傷但少壯人須五日一次恐熱上攻眼目也中暑之證原只尋常苟渴飲無度知母散可一服若困倦不食便當溫中設暑客於心包絡譫煩飲冷溺澀便赤清心涼血皆一劑可愈者若今之醫家將一切內傷虛寒之證亦認為暑恣用寒涼朝夕靡已及變陰深冷脫猶云暑邪內攻病勢深重難挽回矣間遇明眼高手投以參附猶且從中阻撓洎投之有效輒靦顏支飾我原欲轉手不謂渠意亦同投之不效讒言蜂起一肩卸卻罪歸參附病家本不識病情未免隨之怨悵嗟嗟此種醫人天良盡喪予具熱腸常遭此輩謗累因書此以志慨暑月脾燥病凡夏月冷物傷脾又兼暑氣客之則成燥病令人發熱作渴不止六脈弦大乃火熱傷肺而津液不能上輸也有脾胃之分若發燥熱而能食者熱在胃也易治服全真丹蓽澄茄散而愈若發燥熱不進飲食四肢倦怠熱在脾也為重服金液草神或來復等丹五日而愈如作暑治下以涼藥熱雖暫退必變為中滿洞泄諸證暑月發熱務分虛實六脈沉數飲食如常者為實熱服薄荷煎而愈若六脈弦緊減食倦怠者為虛熱大忌寒涼宜全真來復等丹而愈夏月發熱作渴脈弦而大誰肯不作暑治而不用寒涼者不知暑熱熏蒸耗人元氣元氣既傷未有不渴冷物傷脾有乖輸灌三焦失運腠理不和發熱作渴自所不免且六脈弦大弦則為減大則為虛體驗果真一溫可解今之醫家專尚香薷青蒿黃連滑石等劑變為瀉泄猶云協熱及至虛脫全然不覺此由脈理未明誤主作賊之誤也凡夏月陰氣在腹又暑能傷人元氣更兼冰水冷物損其脾胃皆不足證也局方俱用香薷飲白虎益元黃連解毒等劑重傷元氣輕則變瘧痢霍亂泄瀉等證重則成虛勞中滿注瀉等證余常以保元來復全真金液延壽姜附湯等類治暑百發百中好生之士請嘗試之兩脅連心痛此證由憂思惱怒飲食生冷醉飽入房損其脾氣又傷肝氣故兩脅作痛庸醫再用寒涼藥重傷其脾致變大病成中滿番胃而死或因惱怒傷肝又加青陳皮枳殼實等重削其肝致令四肢羸瘦不進飲食而死治之正法若重者六脈微弱羸瘦少飲食此脾氣將脫急灸左命關二百壯固住脾氣則不死後服金液全真來復等丹及蓽澄茄散隨證用之自愈此證古法在左為肝木為病瘀血不消惱怒所傷在右則為痰為飲為食積氣滯此皆標病易於治療若宗氣有乖虛里作楚榮氣失調脾絡作痛此非積漸溫養不愈至若兩脅連心痛如刀刺此三陰受殞逆於膈肓之間非重用溫補不可又肥氣息賁此積在藏之募原若泥古方專於剝削未有不死者也消渴此病由心肺氣虛多食生冷冰脫肺氣或色欲過度重傷於腎致津不得上榮而成消渴蓋腎脈貫咽喉系舌本若腎水枯涸不能上榮於口令人多飲而小便反少方書作熱治之損其腎元誤人甚多正書春灸氣海三百壯秋灸關元二百壯日服延壽丹十丸二月之後腎氣復生若服降火藥暫時有效日久肺氣漸損腎氣漸衰變成虛勞而死矣此證大忌酒色生冷硬物若脾氣有餘腎氣不足則成消中病脾實有火故善食而消腎氣不足故下部少力或小便如疳孫思邈作三焦積熱而用涼藥損人不少蓋脾雖有熱而涼藥瀉之熱未去而脾先傷敗正法先灸關元二百壯服金液丹一斤而愈消渴雖有上中下之分總由於損耗津液所致蓋腎為津液之原脾為津液之本本原虧而消渴之證從此致矣上消者素問謂之鬲消渴而多飲小便頻數中消者索問謂之消中消穀善飢身體消瘦下消者素問謂之肺消渴而便數有膏飲一溲二後人又謂之腎消腎消之證則已重矣若脈微而澀或細小身體瘦瘁溺出味甘者皆不治之證也大法以救津液壯水火為生治驗一人頻飲水而渴不止余曰君病是消渴也乃脾肺氣虛非內熱也其人曰前服涼藥六劑熱雖退而渴不止覺胸脅氣痞而喘余曰前證止傷脾肺因涼藥復損元氣故不能健運而水停心下也急灸關元氣海各三百壯服四神丹六十日津液復生方書皆作三焦猛熱下以涼藥殺人甚於刀劍慎之津液受傷不惟消渴亦兼雜病而誤用寒涼者不少時醫以此殺人而人不悟奈何著惱病此證方書多不載人莫能辨或先富後貧先貴後賤及暴憂暴怒皆傷人五臟多思則傷脾多憂則傷肺多怒則傷肝多欲則傷心至於憂時加食則傷胃方書雖載內因不立方法後人遇此皆如虛證治之損人性命其證若傷肝脾則泄瀉不止傷胃則昏不省人事傷腎則成癆瘵傷肝則失血筋攣傷肺則咯血吐痰傷心則顛冒當先服姜附湯以散邪後服金液丹以保脾胃再詳其證而灸之若脾虛灸中府穴各二百壯腎虛灸關元穴三百壯二經若實自然不死後服延壽丹或多服金液丹而愈涼藥服多重損元氣則死此證皆因七情所傷五志之過審其所因而調治之庶無失誤治驗一人年十五因大憂大惱卻轉脾虛庸醫用五苓散及青皮枳殼等藥遂致飲食不進胸中作悶余令灸命關二百壯飲食漸進灸關元五百壯服姜附湯一二劑金液丹二斤方愈方書混作勞損用溫平小藥誤人不少悲夫大憂惱而得脾泄醫用五苓青皮枳殼變尚如此近有六脈虛脫脾腎敗壞猶云不妨而用此藥者又庸醫中之廝隸也頭暈此證因冷痰聚於腦又感風寒故積而不散令人頭旋眼暈嘔吐痰涎老年人宜服附子半夏湯少壯人宜服半夏生薑湯若用涼劑則暫時有效痰愈凝而愈固難以速效矣此即所謂頭風證故有冷痰聚腦又感風寒之說若頭暈則純屬於虛蓋肝虛則血不上榮肺虛則清陽不運腎虛則厥成顛疾心虛則火炎浮越夫風虛痰火間或有之至於頭風虛證不少不可不知治驗一人頭風發則旋暈嘔吐數日不食余為針風府穴向左耳入三寸去來留十三呼病人頭內覺麻熱方令吸氣出針服附子半夏湯永不發華佗針曹操頭風亦針此穴立愈但此穴入針人即昏倒其法向左耳橫下針則不傷大筋而無暈乃千金妙法也此針法奇妙須與高手針家議之方得無誤一人起居如常但時發頭痛此宿食在胃脘也服丁香丸十粒而愈厥證素問云五絡俱絕形無所知其狀若屍名為屍厥由憂思驚恐致胃氣虛閉於中焦不得上升下降故昏冒強直當灸中脘五十壯即愈此證婦人多有之小兒急慢驚風亦是此證用藥無效若用吐痰下痰藥即死惟灸此穴可保無虞令服來復丹蓽澄茄散而愈厥證經言詳矣屍厥不過厥證之一端外有血厥痰厥煎厥薄厥總皆根氣下虛之證所謂少陰不至者厥也又云內奪而厥則為喑痱此腎虛也治驗一婦人產後發昏二目滯澀面上發麻牙關緊急二手拘攣余曰此胃氣閉也胃脈挾口環唇出於齒縫故見此證令灸中脘穴五十壯即日而愈產後血厥倉公白薇散一婦人時時死去已二日矣凡醫作風治之不效灸中脘五十壯即愈氣脫少年酒色太過脾腎氣虛忽然脫氣而死急灸關元五百壯服霹靂湯姜附湯金液丹久久而愈此證須早治遲則元氣亦脫灸亦無及矣更有血脫神脫精脫津脫液脫若汗脫即津液脫也死脈見此由少年七情六慾所損故致晚年真氣虛衰死脈見於兩手或十動一止或二十動一止皆不出三年而死又若屋漏雀喙之類皆是死脈灸關元五百壯服延壽丹保元丹六十日後死脈方隱此仙師不傳之妙法也雍正三年初冬一董姓者來求診脈其脈或二動一止或七動一止或十二動或十七動一止此心絕脈也仲冬水旺其何能生姑定參耆茸附河車臍帶桂心棗仁等方與之服十劑脈之歇止參差不似前之有定數矣又十劑而歇止少矣又十劑六脈如常矣噫不可謂藥之無功也且知治早雖不用丹艾亦有可生全者腰痛老年腎氣衰又兼風寒客之腰髖髀作痛醫作風痹走痛治用宣風散趁痛丸重竭真氣誤人甚多正法服姜附湯散寒邪或全真丹灸關元百壯則腎自堅牢永不作痛須服金液丹以壯元陽至老年不發老年腰痛而作風氣痹證治者多致大害即使風痹重用溫補亦能散去中風人氣虛中滿此由脾腎虛憊不能運化故心腹脹滿又氣不足故行動則胸高而喘切不可服利氣及通快藥令人氣愈虛傳為脾病不可救矣宜金液丹全真丹一月方愈重者灸命關關元二百壯腎虛則生氣之原乏脾虛則健運之力微氣虛中滿之證作矣又內經謂藏寒生滿病醫人知此不行剝削重劑溫補為變者少矣老人兩脅痛此由胃氣虛積而不通故脅下脹悶切不可認為肝氣服削肝寒涼之藥以速其斃服草神金液十日重者灸左食竇穴一灸便有下氣而愈再灸關元百壯更佳老人與病後及體虛人兩脅作痛總宜以調理肝脾更須察其兼證有無虛實治頗不易治驗一人脾氣虛好食冷物不消常覺口中出敗卵臭服草神丹即愈若服全真金液亦效脾胃既為食所傷不可再施消克唯治以溫化則自健運矣一人脾氣虛致積氣留於脅下兩肋常如流水多服草神丹而愈脾虛致積當用溫行水流脅下更仗溫化疝氣由於腎氣虛寒凝積下焦服草神丹灸氣海穴自愈此證內經論五臟皆有而後人以病由於肝先生言因腎氣虛寒總不若丹艾之妙吞酸凡人至中年脾氣虛弱又傷生冷硬物不能運行蘊積中焦久之變為鬱火停疾故令噫氣久則成中滿腹脹之證須服草神丹全真丹金液丹皆可吞酸為病雖微致害非淺苟不慎節飲食戒謹房幃久久無不變成臌脹脾瘧凡瘧病由於暑月多吃冰水冷物傷其脾胃久而生痰古今議論皆差或指暑邪或分六經或云邪崇皆謬說也但只有脾胃之分胃瘧易治脾瘧難調或初起一日一發或間日一發乃陽明證也清脾飲截瘧丹皆可若二三日一發或午後發綿延不止者乃脾瘧也此證若作尋常治之誤人不少正法當服全真草神四神等丹若困重日久肌膚漸瘦飲食減少此為最重可灸左命關百壯自愈窮人艱於服藥只灸命關亦可愈凡久瘧止灸命關下火便愈實秘法也脾瘧原屬正虛治得其法應手即愈而世人竟尚柴胡攻多補少不知元氣既虛又拔其本以致耽延時日變端百出先生灸法實可宗主治驗一人病瘧月餘發熱未退一醫與白虎湯熱愈甚余曰公病脾氣大虛而服寒涼恐傷脾胃病人云不服涼藥熱何時得退余曰內經云瘧之始發其寒也烈火不能止其熱也冰水不能遏當是時良工不能措其手且扶元氣待其自衰公元氣大虛服涼劑退火吾恐熱未去而元氣脫矣因為之灸命關才五七壯脅中有氣下降三十壯全愈久瘧而用白虎真所謂盲人說瞎話也繆仲醇一代名醫論多出此竊所未解予觀廣筆記疑其所學全無巴鼻至於本草經疏設立許多禁忌令後人疑信相半不敢輕用為患匪細胃瘧素問論瘧而無治法千金雖傳治法試之無效凡人暑月過啖冷物輕則傷胃重則傷脾若初起先寒後熱一日一發乃胃瘧也易治或吐或下不過十日而愈扁鵲正法服四神丹甚者灸中脘穴三十壯愈此證感淺病輕人多忽略雍正三年秋冬之交人皆病此重劑溫補或可倖免投藥少瘥立見冰脫用清解小柴胡者皆不能起寧紹之人死者比比以其溺用寒涼雖一誤再誤而終不悟也邪祟此證皆由元氣虛弱或下元虛憊憂恐太過損傷心氣致鬼邪乘虛而入令人昏迷與鬼交通當服睡聖散灸巨闕穴二百壯鬼氣自滅服姜附湯而愈邪祟烏能著人人自著之耳果立身正直心地光明不負君親無慚屋漏鬼神欽敬不遑何邪祟之敢乘哉惟其陰幽偏頗卑惵昏柔之輩多能感此有似邪祟之附著究非邪祟也蓋由人之藏氣受傷而神魂失守故肝臟傷則意不寧而白衣人來搏擊心臟傷則神不安而黑衣人來毀傷脾臟傷則意有不存而青衣人來毆辱肺臟傷則魄不守而紅衣人來凌轢腎臟傷則志多猶疑而黃衣人來斥辱此皆神氣受傷以致妄有聞見不覺其見乎四體發乎語言而若有邪祟所附也正法惟有安其神魂定其志魄審其何臟之虛而補之何臟之乘而制之可也治驗一婦人因心氣不足夜夜有少年人附著其體診六脈皆無病余令灸上脘穴五十壯至夜鬼來離床五尺不能近服姜附湯鎮心丹五日而愈一貴人妻為鬼所著百法不效有一法師書天醫符奏玉帝亦不效余令服睡聖散三錢灸巨闕穴五十壯又灸石門穴三百壯至二百壯病人開眼如故服姜附湯鎮心丹五日而愈一婦人病虛勞直氣將脫為鬼所著余用大艾火灸關元彼難忍痛乃令服睡聖散三錢復灸至一百五十壯而醒又服又灸至三百壯鬼邪去勞病亦瘥怔忡凡憂思太過心血耗散生冷硬物損傷脾胃致陰陽不得升降結於中焦令人心下恍惚當以來復丹金液丹蓽澄茄散治之若心血少者須用獨骸大丹次則延壽丹亦可憂思之傷怔忡之本證飲食之傷怔忡之兼證微有虛實之殊審證施治自然無誤心痛皆由鬱火停痰而作飲食生冷填於陽明太陰分野亦能作病宜全真丹若胃口寒甚全真丹或姜附湯不愈灸中脘七十壯若脾心痛發而欲死六脈尚有者急灸左命關五十壯而蘇內服來復丹蓽澄茄散若時痛時止吐清水者乃蛔攻心包絡也服安蟲散若卒心痛六脈沉微汗出不止爪甲青足冷過膝乃真心痛也不治心為一身之主宰一毫不可犯處正無偏豈宜受病凡痛非心痛乃心之包絡痛與脾痛胃痛膈痛耳審其所因所客或氣或痰雖有九種之分虛實之異大概虛者為多屬實者間亦有之審察而治庶無差錯痹病風寒濕三氣合而為痹走注疼痛或臂腰足膝拘攣兩肘牽急乃寒邪湊於分肉之間也方書謂之白虎歷節風治法於痛處灸五十壯自愈湯藥不效惟此法最速若輕者不必灸用草烏末二兩白麵二錢醋調熬成稀糊攤白布上乘熱貼患處一宿而愈痹者氣血凝閉而不行留滯於五臟之外合而為病又邪入於陰則為痹故凡治痹非溫不可方書皆作實治然屬虛者亦頗不少神癡病凡人至中年天數自然虛衰或加妄想憂思或為功名失志以致心血大耗癡醉不治漸至精氣耗盡而死當灸關元穴三百壯服延壽丹一斤此證尋常藥餌皆不能治惟灸艾及丹藥可保無虞此乃失志之證有似癡呆或如神祟自言自笑神情若失行步若聽非大遂其志不能愈故愈者甚少治驗一小兒因觀神戲受驚時時悲啼如醉不食已九十日危甚令灸巨闕五十壯即知人事曰適間心上有如火滾下即好服鎮心丸而愈驚則神無所倚痰涎入客包絡宮城受傷心不安寧故肺氣來乘而虛火上蒸灸法之妙愈於緩驚錠抱龍丸多矣一人功名不遂神思不樂飲食漸少日夜昏默已半年矣諸醫不效此病藥不能治令灸巨闕百壯關元二百壯病減半令服醇酒一日三度一月全安蓋醺酣忘其所慕也失志不遂之病非排遣性情不可以灸法操其要醉酒陶其情此法妙極下注病貧賤人久臥濕地寒邪客於腎經又兼下元虛損寒濕下注血脈凝滯兩腿粗腫行步無力漸至大如瓜瓠方書皆以消濕利水治之損人甚多令灸湧泉三里承山各五十壯即愈俗名蘇木腿形狀怪異可畏終身之疾鮮有愈者先生灸法未知驗否腳氣下元虛損又久立濕地致寒濕之氣客於經脈則雙足腫痛行步少力又暑月冷水濯足亦成乾腳氣發則連足心腿胻腫痛如火烙或發熱惡寒治法灸湧泉穴則永去病根若不灸多服金液丹亦好平常藥暫時有效不能全除其不能行步者灸關元五十壯大忌涼藥泄傷腎氣變為中滿腹脹而死久患腳氣人濕氣上攻連兩脅腰腹肩臂拘攣疼痛乃腎經濕盛也服宣風丸五十粒微下而愈然審果有是證者可服若虛人斷不可輕用腳氣壅疾言邪氣壅滯於下有如痹證之閉而不行但此證發則上衝心胸嘔吐煩悶甚為危險即內經所謂厥逆是也輕者疏通經脈解散寒濕調其陰陽和其血氣亦易於治如蘇梗腹皮木瓜檳榔蒼朮獨活等藥皆可用也其甚者憎寒壯熱氣逆嘔吐筋急入腹悶亂欲絕此邪衝入腹危險更甚非重用溫化不可如茱萸姜附等藥宜皆用之至如剝削過度脈微欲絕變成虛寒往往不起不可謂壅疾而不利於補也治驗一人患腳氣兩䯒骨連腰日夜痛不可忍為灸湧泉穴五十壯服金液丹五日全愈此證有似痛痹一女人患腳氣忽手足遍身拘攣疼痛六脈沉大乃胃氣盛也服宣風丸三十粒泄去而愈此證須細審的確方可用足痿病凡腰以下腎氣主之腎虛則下部無力筋骨不用可服金液丹再灸關元穴則腎氣復長自然能行動矣若腎氣虛脫雖灸無益此證內經皆言五臟虛熱故後人有補陰虎潛金剛地黃等丸東垣又作濕熱而以潛行散為治痿妙藥然不可泥也虛寒之證亦頗不少臨證審詳自有分曉治驗一老人腰腳痛不能行步令灸關元三百壯更服金液丹強健如前黃疸暑月飲食冷物損傷脾腎脾主土故見黃色又脾氣虛脫濁氣停於中焦不得升降故眼目遍身皆黃六脈沉緊宜服草神丹及金液全真來復之類重者灸食竇穴百壯大忌寒涼此證第一要審陰陽陽黃必身色光明脈來洪滑善食發渴此皆實證清濕熱利小便可愈若身熱脈浮亦可發表陰黃則身色晦暗神思困倦食少便溏脈來無力重用溫補則小便長而黃白退若誤作陽黃治之為變非細又一種膽黃證因大驚卒恐膽傷而汁泄於外為病最重惟覺之早而重用溫補者尚可挽回治驗一人遍身皆黃小便赤色而澀灸食竇穴五十壯服姜附湯全真丹而愈黑疸由於脾腎二經縱酒貪色則傷腎寒飲則傷脾故兩目遍身皆黃黑色小便赤少時時腸鳴四肢困倦飲食減少六脈弦緊乃成腎癆急灸命關三百壯服草神丹延壽丹而愈若服涼藥必死便閉老人氣虛及婦人產後少血致津液不行不得通流故大便常結切忌行藥是重損其陰也止服金液丹久久自潤或潤腸丸亦可又大小便主腎腎開竅於二陰能運行津液若腎氣虛則二便皆不通亦服金液丹腎氣壯則大小便自利矣有陳姓鹽商年七十六矣春時患中風脫證重劑參附二百餘服獲痊至十月大便閉結不行日登廁數十次冷汗大出面青肢厥一馬姓醫用滋補劑入生大黃三錢予深以為不可戒之曰老年脫後幸參附救全不能安養過於思慮以致津液枯竭傳送失宜惟可助氣滋津佐以溫化自然流通何事性急以速其變若一投大黃往而不返恐難於收功矣姑忍二三日勢當自解病者怪予遲緩口出怨咎之辭至次日不得已用人參二兩蓯蓉一兩當歸五錢松柏仁各五錢附子三錢升麻四錢煎服外用綠礬一斤入圊桶以滾水衝入扶其坐上一刻而通溺血凡膏粱人火熱內積又多房勞真水既涸致陰血不靜流入膀胱從小便而出可服延壽丹甚者灸關元若少壯人只作火熱治之然在因病制宜火熱為積實證也一劑寒涼可解房勞傳腎虛證也非溫補不可審證而治大有分別淋證此由房事太過腎氣不足致包絡凝滯不能通行水道則成淋也服檳榔湯鹿茸丸而愈若包絡閉澀則精結成砂子從莖中出痛不可忍可服保命丹甚者灸關元淋濁之證古人多用寒涼分清通利之品然初起則可久而虛寒又當從溫補一法腸癖下血此由飲食失節或大醉大飽致腸胃橫解久之冷積於大腸之間致血不流通隨大便而出病雖尋常然有終身不愈者庸醫皆用涼藥止血故連綿不已蓋血愈止愈凝非草木所能治也正法先灸神闕穴百壯服金液丹十兩日久下白膿乃病根除也經云陰絡傷則血內溢血內溢則後血治此之法總在別其脈之強弱色之鮮暗該清該溫愈亦不難若不慎飲食恣縱酒色斷不能愈矣
