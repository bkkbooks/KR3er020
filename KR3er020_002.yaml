body:
  text: 卷上當明經絡諺云學醫不知經絡開口動手便錯蓋經絡不明無以識病證之根源究陰陽之傳變如傷寒三陰三陽皆有部署百病十二經脈可定死生既講明其經絡然後用藥徑達其處方能奏效昔人望而知病者不過熟其經絡故也俗傳遇長桑居授以懷中藥飲以上池之水能洞見臟腑此虛言耳今人不明經絡止讀藥性病機故無能別病所在漫將藥試偶對稍愈便爾居功況亦未必全愈若一不對反生他病此皆不知經絡故也近世時醫失口言經絡部位乃外科治毒要法方脈何藉於此嗟嗟經絡不明何以知陰陽之交接臟腑之遞更疾病情因從何審察夫經絡為識病之要道尚不肯講求焉望其宗主內經研究傷寒識血氣之生始知榮衛之循行陰陽根中根外之理不明神機或出或入之道不識師徒授受唯一明醫指掌藥性歌括以為熟此儘可通行用藥誤人全然不辨或遇明醫枝梧扯拽更將時事俗情亂其理談常恐露出馬腳唯一周旋承奉彼明理人焉肯作惡只得挽回數言以蓋其誤如此時醫誠為可恥須識扶陽道家以消盡陰翳煉就純陽方得轉凡成聖霞舉飛昇故云陽精若壯千年壽陰氣如強必斃傷又云陰氣未消終是死陽精若在必長生故為醫者要知保扶陽氣為本人至晚年陽氣衰故手足不暖下元虛憊動作艱難蓋人有一息氣在則不死氣者陽所生也故陽氣盡必死人於無病時常灸關元氣海命關中脘更服保元丹保命延壽丹雖未得長生亦可保百餘年壽矣今人只是愛趨死路動云我有火病難服熱藥所延之醫悉皆趨承附和不言上焦有火即雲中下積熱及至委頓亦不知變遷或遇明眼之醫略啟扶陽之論不覺彼此搖頭左右顧盼不待書方而已有不服之意矣生今之世思欲展抱負施姜附尚且難入而丹藥灼艾之說斷乎其不可行也住世之法紹興間劉武軍中步卒王超者本太原人後入重湖為盜曾遇異人授以黃白住世之法年至九十精彩腴潤辛卯年間岳陽民家多受其害能日淫十女不衰後被擒臨刑監官問曰汝有異術信乎曰無也唯火力耳每夏秋之交即灼關元千炷久久不畏寒暑累日不飢至今臍下一塊如火之暖豈不聞土成磚木成炭千年不朽皆火之力也死後刑官令剖其腹之暖處得一塊非肉非骨凝然如石即艾火之效耳故素問云年四十陽氣衰而起居乏五十體重耳目不聰明矣六十陽氣大衰陰痿九竅不利上實下虛涕泣皆出矣夫人之真元乃一身之主宰真氣壯則人強真氣虛則人病真氣脫則人死保命之法灼艾第一丹藥第二附子第三人至三十可三年一灸臍下三百壯五十可二年一灸臍下三百壯六十可一年一灸臍下三百壯令人長生不老餘五十時常灸關元五百壯即服保命丹延壽丹漸至身體輕健羨進飲食六十三時因憂怒忽見死脈於左手寸部十九動而一止乃灸關元命門各五百壯五十日後死脈不復見矣每年常如此灸遂得老年康健乃為歌曰一年辛苦唯三百灸取關元功力多健體輕身無病患彭籛壽算更如何先生三法實為保命之要訣然上策人多畏懼而不肯行中策古今痛掃視為險途若下策用之早而得其當亦可十救其五予遵行歷年不無有效有否效則人云偶中否則讒謗蜂起此非姜附之過乃予熱腸之所招也吾徒不可以此而退縮不前視人之將死可救而莫之救也大病宜灸醫之治病用灸如做飯需薪今人不能治大病良由不知針艾故也世有百餘種大病不用灸艾丹藥如何救得性命劫得病回如傷寒疽瘡勞瘵中風腫脹泄瀉久痢喉痹小兒急慢驚風痘疹黑陷等證若灸遲真氣已脫雖灸亦無用矣若能早灸自然陽氣不絕性命堅牢又世俗用灸不過三五十壯殊不知去小疾則愈駐命根則難故銅人針灸圖經云凡大病宜灸臍下五百壯補接真氣即此法也若去風邪四肢小疾不過三五七壯而已仲景毀灸法云火氣雖微內攻有力焦骨傷筋血難復也余觀亙古迄今何嘗有灸傷筋骨而死者彼蓋不知灸法之妙故爾靈樞論虛而至陷下溫補無功借冰臺以起陷下之陽耳若仲景所言微數之脈慎不可灸脈而至於微矣似有似無則真陽已漓又至於數矣則真陰已竭陰陽漓竭灸亦無益但有炎焰而無溫存寧不焦骨傷筋而血難復非毀灸也孫思邈早年亦毀灸法逮晚年方信乃曰火灸大有奇功昔曹操患頭風華佗針之應手而愈後佗死復發若於針處灸五十壯永不再發或曰人之皮肉最嫩五百之壯豈不焦枯皮肉乎曰否已死之人灸二三十壯其肉便焦無血榮養故也若真氣未脫之人自然氣血流行榮衛環繞雖灸千壯何焦爛之有哉故治病必先別其死生若真氣已脫雖灸亦無用矣唯是膏粱之人不能忍耐痛楚當服睡聖散即昏不知痛其睡聖散余自用灸膝神效放心服之斷不誤人以救己之心推以救人所謂見身說法其言誠真其心誠切其論誠千古不磨之論無如天下之不信何三世扁鵲醫門得岐黃血脈者扁鵲一人而已扁鵲黃帝時人授黃帝太乙神明論著五色脈診三世病源後淳于意華佗所受者是也第二扁鵲戰國時人姓秦名越人齊內都人採內經之書撰八十一難慨正法得傳者少每以扁鵲自比謂醫之正派我獨得傳乃扁鵲再出也故自號扁鵲第三扁鵲大宋竇材是也余學素問靈樞得黃帝心法革古今醫人大弊保天下蒼生性命常以扁鵲自任非敢妄擬古人蓋亦有所徵焉嘗因路過衢州野店見一婦人遍身浮腫露地而坐余曰何不在門內坐婦曰昨日蒙土地告我明日有扁鵲過此可求治病我故於此候之余曰汝若聽我我當救汝婦曰汝非醫人安能治病余曰我雖非醫然得扁鵲真傳有奇方故神預告汝遂與保命延壽丹十粒服之夜間小便約去二升五更覺飢二次又服十五粒點左命關穴灸二百壯五日後大便下白膿五七塊半月全安婦曰真扁鵲再生也予治數人患此症者浮腫喘急臥難著席漿粥俱不入矣既無丹藥亦不肯灸只用重劑姜附十餘帖而形體復舊飲食如常可知人能信用溫化即不灸亦有生機想扁鵲獨倚其才旁遊列國為同道刺死華佗亦不傳其法為人譛死皆因秘而不發招人之忌耳余將心法盡傳於世凡我同心肯學正傳不妨亦以扁鵲自命可也舜何人哉予何人哉有為者亦若是時醫三錯凡陰疽及鬼邪著人或兩眼內障此三法皆出內經其瘡疽本於腎虛為陰所著寒邪滯經依附於骨故爛人筋害人性命其法必大補腎氣壯陽消陰土得陽氣自生肌肉則元氣周流不侵骨髓矣今則附入外科庸醫不知反用敗毒涼藥致元氣虛憊而死者多矣親見一婦人患伏免陰疽形扁色白大如覆盂延一艮山門瘍醫連用清火敗毒藥四劑不待膿潰一瀉而死鬼邪著人者皆由陰盛陽虛鬼能依附陰氣故易而成病若陽光盛者焉敢近之治法大補元氣加以育神則鬼邪自然離體病家不知專求符籙此等外道決無靈驗或假手庸醫認為燥火投以涼藥或清熱化痰致人枉死良可悲哉世俗於輕淺小疾皆事巫祝況鬼祟為殃肯舍巫籙乎加之醫用寒涼故爾愈者不易眼生內障由於脾腎兩虛陽光不振耳故光之短主於脾視物不明主乎腎法當溫補脾腎壯陽光以消陰翳則目明矣今則另立眼科以成一家之技只用涼劑冰損元陽致脾腎虛衰而死殊不知一切病證皆有內經正法後人分立十三科妄名是以識見小者專習一科成一偏之見譬之大海中認一浮漚綜理未貫動即傷生悲哉予目睹京中來一太醫院官陳某自炫能開瞽目專以冷水冰伏又以寒膏內陷其人本領實而火重者見效亦捷若本弱元虧者無不陰受其害斜橋一鹽販之妻服膏半盞腹即㽲痛其夫強之服盡大吐而斃其夫一時惶急從樓窗躍出街心哭叫陳太醫藥殺我婦百種辱罵累及祖先聞者無不寒心筆此以見寒涼誤人並信耳不信目之戒忌用轉下內經並無轉下之說止言發散又止言辛甘發散為陽辛溫之藥達表則自然汗散攻裡則自然開通據先生之論謂辛甘發散為陽故表邪解而里自和非辛甘能攻裡也後人當活看非若寒苦之藥動人臟腑泄人元氣也夫巴豆硝黃之類能直穿臟腑非大積大聚元氣壯實者不敢輕用今之庸醫不問虛實動輒便行轉下以泄六腑各氣轉生他證重則脾胃漸衰不進飲食肌肉消瘦而死又俗云春行夏補至秋時須服通行藥數劑以泄夏月積熱此語甚訛俗醫慣將此數語印人耳目夫內經四時調養生長收藏之道與春夏養陽秋冬養陰之法何等圓活而愚人執守一說不肯精求靈素良可慨也夫熱在內自然從五臟六腑及大小便中泄出若以涼藥泄熱吾恐熱氣未去一分而元氣已衰九分嘗觀服轉藥一劑則有五七日飲食脾胃不能復舊況乎三焦暖熱方能腐熟水穀若一刻無火則肌膚冰冷陽氣脫盡而死矣故內經止有沉寒痼冷之論未有積熱純陽之說縱然積熱為病一服轉下便可解救若陰寒為病則四肢逆冷死在須臾古人立法若狂言妄語逾垣上屋諸大熱證亦要論其大便如何數日不出者有燥屎也方下之若大便如常即不可下狂言妄語逾垣上屋自是熱證然有一種面青脈急或面黑脈微手足厥冷者又屬陰證此係無附之陽必死之證若治之早或有生者今人於並無以上熱證而亦概用寒涼轉下必欲盡去其熱吾不知將以何為生氣夫人身無熱則陽氣盡矣此河間丹溪遺訛後世業醫者不可以不察此弊也禁戒寒涼夫四百八病大約熱者居多寒者最少無怪乎河間論火丹溪之補陰也但泥二子之書而不考究內經墮於偏頗害人特甚蓋熱病屬陽陽邪易散易治不死冷病屬陰陰邪易伏故令人不覺久則變為虛寒侵蝕臟腑而死初起不覺之證最能害人往往輕忽之而一變致死者不少況人身之火多亦是當然天之六氣火居其二今之庸醫執壯火食氣之說內經壯火食氣之說猶炎暑盛而人氣乏相火熾而真元傷非涼藥之治亦非熱藥之謂馬元臺不察此理妄為註釋遺訛後學不淺溺於滋陰苦寒之劑殊不知邪之中人元氣盛則能當之乃以涼藥冰脫反泄元氣是助賊害主也夫涼藥不知害了多少人若元氣稍虛者無不被涼藥冰敗而死脾胃有傷焉望其生如人飲熱湯及炙爆之物從齠至髦斷無損人之理內經言膏粱之變止發癰疽況膏粱發疽者百無一二故知熱之養人時刻不可缺也若以冷水飲人不須三日即為腹疼泄瀉脾虛胃敗矣故燧人立法食必用火萬代蒼生得以活命俗醫大用涼劑譬於飲人冷水陰害黎民良可慨也不見當今醫家禍及子孫甚至滅門絕後皆學術不精之報也醫者觀此切須猛省誤用涼藥之害真實不爽予見近代時醫專用溫平者或延一息終見陵替專以寒涼攻伐夭札人命者誠未見其有後也要知緩急夫病有淺深治有緩急體認病情而用藥緩急合當乃醫家第一要著若急病而用緩藥是養殺人也緩病而用急藥是逼殺人也庸醫遇病不能必其何名亦不能必其當用何藥概以溫平試之若緩病尚可設遇大病則為誤不小故名養殺人若緩病投以急藥是欲速其效殊不知攻急則變生所謂逼殺人也二者之誤今世醫家比比膽怯者蹈養殺之弊心粗者逞逼殺之害醫本生人乃為殺藪悲哉余觀京師名醫呂實者亦熟此法但不早用惟先用溫平藥調治及至危篤方議灼艾丹附等事多不效乃曰此天命也殊不知救挽已遲藏氣敗絕雖靈丹妙藥無能為矣余親見彼治一傷寒第五日昏睡譫語六脈洪大以為胃中有熱以承氣下之四更即死矣六脈之大非洪也乃陽氣將脫故見此耳治以下藥更虛其陰則陽無所附而死速矣若先於臍下灸三百壯固住脾腎之氣內服保元丹斂陽丹飲姜附湯過三日自然汗出而愈余治一傷寒亦昏睡妄語六脈弦大余曰脈大而昏睡定非實熱乃脈隨氣奔也強為之治先生真仁人也強治之心余頗有之第以人不我信且又礙於言訥而不肯為究非真行仁術之人常以此自愧用烈火灸關元穴初灸病人覺痛至七十壯遂昏睡不疼灸至三鼓病人開眼思飲食令服姜附湯至三日後方得元氣來復大汗而解今時姑息成風灸法難行余嘗嘆曰人參雖救命之品姜附尤有回陽之功無如世人不識俗醫痛掃良可慨也余思前證少陰病也發昏譫語全似陽證若時投以承氣豈得不死故耳聾不呻吟身生赤黑靨而十指冷至腳面身重如山口多痰唾時發躁熱者皆少陰證也仲景以耳聾系之少陽譫語歸之陽明用柴胡承氣輩誤人不少夫但知少陽脈循脅絡耳卻不思耳竅屬腎以耳聾歸少陽此仲景所未到之處也耳聾仲景作宗氣虛論未嘗歸少陽至於譫語論中言神氣虛者多若陽明證中不過數條而已先生故加貶駁未免有意索瘢五等虛實凡看病要審元氣虛實實者不藥自愈虛者即當服藥灸關元穴以固性命若以溫平藥亦難取效淹延時日漸成大病溫平之藥近世所尚旁人稱其穩當醫士習於兩岐及至變成大病惶急錯投誤而又誤總由識見不真遂爾因循貽害虛病多般大略分為五種有平氣微虛甚虛將脫已脫之別平氣者邪氣與元氣相等正可敵邪只以溫平藥調理緩緩而愈如補中益氣小柴胡八物湯是也微虛者邪氣旺正氣不能敵之須服辛溫散邪之藥當補助元氣使邪氣易伏宜蓽澄茄散全真丹來復丹理中丸姜附湯之類是也甚虛者元氣大衰則成大病須用辛熱之藥厚味之劑大助元陽不暇攻病也經云形不足者溫之以氣精不足者補之以味即官桂附子鹿茸河車之類是也將脫者元氣將脫也尚有絲毫元氣未盡唯六脈尚有些小胃氣命若懸絲生死立待此際非尋常藥餌所能救須灸氣海丹田關元各三百壯固其脾腎夫脾為五臟之母腎為一身之根故傷寒必診太谿衝陽二脈者即脾腎根本之脈也此脈若存則人不死故尚可灸內服保元丹獨骸大丹保命延壽丹或可保其性命單顧脾腎乃先生學力大有根柢之論蓋腎為先天之原脾為後天之本資生資始莫不由茲故病雖甚而二脈中有一脈未散扶之尚可延生若已脫則真氣已離脈無胃氣雖灸千壯亦無用矣此五種證當於平時細心探討自然隨機應變不致差訛近世之醫多尚寒涼專行克伐致使平氣變虛虛證變脫及至三焦失運神氣改常出入道乖升降機息而猶執邪氣未盡火熱未除之說朝涼暮削不死不休良可悲痛黃帝灸法男婦虛勞灸臍下三百壯男婦水腫灸臍下五百壯陰疽骨蝕灸臍下三百壯久患脾瘧灸命關五百壯肺傷寒灸臍下三百壯氣厥屍厥灸中脘五百壯纏喉風灸臍下三百壯黃黑疸灸命關二百壯急慢驚風灸中脘四百壯老人二便不禁灸臍下三百壯老人氣喘灸臍下三百壯久患腳氣灸湧泉穴五十壯產後血暈灸中脘五十壯暑月腹痛灸臍下三十壯鬼邪著人灸巨闕五十壯臍下三百壯婦人臍下或下部出膿水灸臍下三百壯婦人無故風搐發昏灸中脘五十壯久患傴僂不伸灸臍俞一百壯鬼魘著人昏悶灸前頂穴五十壯婦人半產久則成虛勞水腫急灸臍下三百壯死脈及惡脈見急灸臍下五百壯婦人產後腹脹水腫灸命關百壯臍下三百壯腎虛面黑色灸臍下五百壯嘔吐不食灸中脘五十壯婦人產後熱不退恐漸成癆瘵急灸臍下三百壯扁鵲灸法命關二穴在脅下宛中舉臂取之對中脘向乳三角取之此穴屬脾又名食竇穴能接脾臟真氣治三十六種脾病凡諸病困重尚有一毫真氣灸此穴二三百壯能保固不死一切大病屬脾者並皆治之蓋脾為五臟之母後天之本屬土生長萬物者也若脾氣在雖病甚不至死此法試之極驗腎俞二穴在十四椎兩旁各開一寸五分凡一切大病於此灸二三百壯蓋腎為一身之根蒂先天之真源本牢則不死又治中風失音手足不遂大風癩疾三里二穴在膝眼下三寸䯒骨外筋內宛中舉足取之治兩目䀮䀮不能視遠及腰膝沉重行步乏力此證須灸中脘臍下待灸瘡發過方灸此穴以出熱氣自愈承山二穴在腿肚下挺腳指取之治腳氣重行步少力湧泉二穴在足心宛宛中治遠年腳氣腫痛或腳心連脛骨痛或下粗腿腫沉重少力可灸此穴五十壯腦空二穴在耳尖角上排三指盡處治偏頭痛眼欲失明灸此穴七壯自愈目明二穴在口面骨二瞳子上入髮際治太陽連腦痛灸三十壯腰俞二穴在脊骨二十一椎下治久患風腰疼灸五十壯前頂二穴在鼻上入髮際三寸五分治巔頂痛兩眼失明附竇材灸法計五十條一中風半身不遂語言謇澀乃腎氣虛損也灸關元五百壯一傷寒少陰證六脈緩大昏睡自語身重如山或生黑靨噫氣吐痰腹脹足指冷過節急灸關元三百壯可保一傷寒太陰證身涼足冷過節六脈弦緊發黃紫斑多吐涎沫發燥熱噫氣急灸關元命關各三百壯傷寒惟此二證害人甚速仲景只以舌乾口燥為少陰腹滿自利為太陰余皆歸入陽證條中故致害人然此二證若不早灸關元以救腎氣灸命關以固脾氣則難保性命蓋脾腎為人一身之根蒂不可不早圖也舌乾口燥乃少陰本熱之證仲景以大承氣急下但此理非身登仲景之堂者不能知非神於仲景之法者不能用蓋火熱亢盛不用承製則燎原之害熾而生化之機息可不畏哉設本熱假而標陰伏誤用承氣立見危亡矣先生灸法真保命全生之要業醫之士切須審察不可鹵莽而行之也仲景蓋以氣化而用承氣若涉形藏別有治法不可混闢一腦疽發背諸般疔瘡惡毒須灸關元三百壯以保腎氣一急喉痹頤粗頷腫水穀不下此乃胃氣虛風寒客肺也灸天突穴五十壯穴在結喉下四寸一虛勞咳嗽潮熱咯血吐血六脈弦緊此乃腎氣損而欲脫也急灸關元三百壯內服保元丹可保性命若服知柏歸地者立死蓋苦寒重損其陽也虛勞而致六脈弦緊即是腎氣損脫乃今之醫治虛勞者脈至微細急疾尚用寒涼真視人如草芥也此種人不知作何結果一水腫膨脹小便不通氣喘不臥此乃脾氣大損也急灸命關二百壯以救脾氣再灸關元三百壯以扶腎水自運消矣一脾泄注下乃脾腎氣損二三日能損人性命亦灸命關關元各二百壯一休息痢下五色膿者乃脾氣損也半月間則損人性命亦灸命關關元各三百壯一霍亂吐瀉乃冷物傷胃灸中脘五十壯若四肢厥冷六脈微細者其陽欲脫也急灸關元三百壯一瘧疾乃冷物積滯而成不過十口半月自愈若延綿不絕乃成脾瘧氣虛也久則元氣脫盡而死灸中脘及左命關各百壯一黃疸眼目及遍身皆黃小便赤色乃冷物傷脾所致灸左命關一百壯忌服涼藥若兼黑疸乃房勞傷腎再灸命關三百壯一番胃食已即吐乃飲食失節脾氣損也灸命關三百壯命關當作命門一屍厥不省人事又名氣厥灸中脘五十壯一風狂妄語乃心氣不足為風邪客於包絡也先服睡聖散灸巨闕穴七十壯灸瘡發過再灸三里五十壯一脅痛不止乃飲食傷脾灸左命關一百壯一兩脅連心痛乃恚怒傷肝脾腎三經灸左命關二百壯關元三百壯一肺寒胸膈脹時吐酸逆氣上攻食已作飽困倦無力口中如含冰雪此名冷勞又名膏肓病乃冷物傷肺反服涼藥損其肺氣灸中府二穴各二百壯一咳嗽病因形寒飲冷冰消肺氣灸天突穴五十壯一久嗽不止灸肺俞二穴各五十壯即止若傷寒後或中年久嗽不止恐成虛勞當灸關元三百壯一癘風因臥風濕地處受其毒氣中於五臟令人面目龐起如黑雲或遍身如錐刺或兩手頑麻灸五臟俞穴先灸肺俞次心俞脾俞再次肝俞腎俞各五十壯周而復始病愈為度一暑月發燥熱乃冷物傷脾胃腎氣所致灸命關二百壯或心膈脹悶作疼灸左命關五十壯若作中暑服涼藥即死矣一中風病方書灸百會肩井曲池三里等穴多不效此非黃帝正法灸關元五百壯百發百中一中風失音乃肺腎氣損金水不生灸關元五百壯一腸癖下血久不止此飲食冷物損大腸氣也灸神闕穴三百壯一虛勞人及老人與病後大便不通難服利藥灸神闕一百壯自通一小便下血乃房事勞損腎氣灸關元二百壯一砂石淋諸藥不效乃腎家虛火所凝也灸關元三百壯一上消病日飲水三五升乃心肺壅熱又吃冷物傷肺腎之氣灸關元一百壯可以免死或春灸氣海秋灸關元三百壯口生津液一中消病多食而四肢羸瘦困倦無力乃脾胃腎虛也當灸關元五百壯一腰足不仁行步少力乃房勞損腎以致骨痿急灸關元五百壯一昏默不省人事飲食欲進不進或臥或不臥或行或不行莫知病之所在乃思慮太過耗傷心血故也灸巨闕五十壯一脾病致黑色痿黃飲食少進灸左命關五十壯或兼黧色乃損腎也再灸關元二百壯一賊風入耳口眼歪斜隨左右灸地倉穴五十壯或二七壯一耳輪焦枯面色漸黑乃腎勞也灸關元五百壯一中年以上之人口乾舌燥乃腎水不生津液也灸關元三百壯若誤服涼藥必傷脾胃而死一中年以上之人腰腿骨節作疼乃腎氣虛憊也風邪所乘之證灸關元三百壯若服辛溫除風之藥則腎水愈涸難救一腿䯒間發赤腫乃腎氣風邪著骨恐生附骨疽灸關元二百壯一老人滑腸困重乃陽氣虛脫小便不禁灸神闕三百壯一老人氣喘乃腎虛氣不歸海灸關元二百壯一老人大便不禁乃脾腎氣衰灸左命關關元各二百壯一兩眼昏黑欲成內障乃脾腎氣虛所致灸關元三百壯一瘰癧因憂鬱傷肝或食鼠涎之毒而成於瘡頭上灸三七壯以麻油潤百花膏塗之灸瘡發過愈一破傷風牙關緊急項背強直灸關元穴百壯一寒濕腰痛灸腰俞穴五十壯一行路忽上膝及腿如錐乃風濕所襲於痛處灸三十壯一腳氣少力或頑麻疼痛灸湧泉穴五十壯一頑癬浸淫或小兒禿瘡皆汗出入水濕淫皮毛而致也於生瘡處隔三寸灸三壯出黃水愈凡灸大人艾炷須如蓮子底闊三分灸二十壯後卻減一分務要緊實若灸四肢及小兒艾炷如蒼耳子大灸頭面艾炷如麥粒子大其灰以鵝毛掃去不可口吹如癲狂人不可灸及膏粱人怕痛者先服睡聖散然後灸之一服止可灸五十壯醒後再服再灸
